<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seasons of Pelican Hearts</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

    :root {
      --wood-dark: #5f3b24;
      --wood-mid: #8c5f3b;
      --wood-light: #b78054;
      --wood-glow: #e7be7b;
      --parchment: #f3e7c8;
      --cream: #f9f1dd;
      --ink: #3e2a1b;
      --ink-soft: #6b4f35;
      --spring: #89b96b;
      --summer: #d6b45e;
      --autumn: #d08a4b;
      --winter: #7ea0c7;
      --shadow: rgba(33, 20, 11, 0.28);
      --deep-shadow: rgba(46, 26, 10, 0.5);
      --hud-h: 58px;
      --dialogue-h: 28%;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      -webkit-font-smoothing: none;
      -moz-osx-font-smoothing: auto;
      text-rendering: optimizeSpeed;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 251, 225, 0.9), rgba(255, 251, 225, 0) 22%),
        radial-gradient(circle at 80% 16%, rgba(255, 236, 198, 0.55), rgba(255, 236, 198, 0) 24%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0)),
        repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.04) 0 12px, rgba(153, 109, 70, 0.04) 12px 24px),
        linear-gradient(180deg, #bcd79b 0%, #efd7a3 45%, #d8b183 100%);
      color: var(--ink);
      font-family: 'VT323', monospace;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .game-shell {
      width: min(1180px, calc(100vw - 36px), calc((100vh - 36px) * 16 / 9));
      height: min(calc((100vw - 36px) * 9 / 16), calc(100vh - 36px), 760px);
      aspect-ratio: 16 / 9;
      min-height: 0;
      background:
        linear-gradient(180deg, rgba(255, 250, 240, 0.55), rgba(240, 221, 188, 0.5)),
        radial-gradient(circle at top, rgba(255,255,255,0.3), rgba(255,255,255,0) 50%);
      border: 12px solid var(--wood-dark);
      border-radius: 26px;
      box-shadow:
        0 28px 70px rgba(41, 24, 10, 0.34),
        0 10px 20px rgba(255, 241, 210, 0.16) inset;
      overflow: hidden;
      position: relative;
    }

    .game-shell::before,
    .game-shell::after {
      content: '';
      position: absolute;
      pointer-events: none;
      z-index: 0;
    }

    .game-shell::before {
      inset: 0;
      background:
        radial-gradient(circle at 20% 0%, rgba(255,255,255,0.18), rgba(255,255,255,0) 30%),
        radial-gradient(circle at 82% 12%, rgba(255,233,182,0.12), rgba(255,233,182,0) 22%);
      mix-blend-mode: screen;
    }

    .game-shell::after {
      inset: 8px;
      border: 2px solid rgba(255, 236, 199, 0.32);
      border-radius: 18px;
    }

    .wood-frame {
      position: relative;
      isolation: isolate;
      border: 8px solid transparent;
      border-image: linear-gradient(135deg, var(--wood-light), var(--wood-dark)) 1;
      box-shadow:
        inset 0 0 0 4px rgba(255, 240, 210, 0.22),
        0 8px 20px rgba(57, 32, 15, 0.18);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(253, 247, 232, 0.96), rgba(237, 221, 191, 0.96)),
        repeating-linear-gradient(0deg, rgba(148, 111, 70, 0.035) 0 2px, rgba(255,255,255,0.05) 2px 4px);
    }

    .wood-frame::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.22), rgba(255,255,255,0) 32%),
        radial-gradient(circle at bottom right, rgba(132, 87, 48, 0.1), rgba(132, 87, 48, 0) 28%);
      pointer-events: none;
      z-index: -1;
    }

    .hud {
      height: var(--hud-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 18px;
      position: relative;
      z-index: 1;
      background:
        linear-gradient(180deg, rgba(108, 76, 42, 0.98), rgba(84, 56, 30, 0.98)),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.05) 0 9px, rgba(0,0,0,0.04) 9px 18px);
      color: #fff5de;
      border-bottom: 4px solid rgba(255, 235, 190, 0.16);
      font-family: 'Press Start 2P', cursive;
      font-size: 11px;
      letter-spacing: 0.02em;
      box-shadow: inset 0 -1px 0 rgba(255, 247, 218, 0.15);
    }

    .hud::after {
      content: '';
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 6px;
      height: 1px;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,239,204,0.42), rgba(255,255,255,0));
    }

    .hud-left,
    .hud-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .season-badge,
    .time-badge,
    .heart-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255, 248, 224, 0.18), rgba(255, 248, 224, 0.08));
      border: 1px solid rgba(255, 235, 196, 0.18);
      box-shadow:
        inset 0 1px 0 rgba(255, 244, 217, 0.18),
        0 2px 10px rgba(0, 0, 0, 0.12);
    }

    .season-icon,
    .heart-icon {
      width: 18px;
      height: 18px;
      display: inline-grid;
      place-items: center;
      font-size: 16px;
    }

    .heart-icon.pulse {
      animation: heartPulse 1.1s infinite ease-in-out;
    }

    .affection-hud {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .affection-meter {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255, 248, 224, 0.2), rgba(255, 248, 224, 0.08));
      border: 1px solid rgba(255, 235, 196, 0.18);
      box-shadow: inset 0 1px 0 rgba(255, 244, 217, 0.18), 0 2px 10px rgba(0, 0, 0, 0.12);
      min-width: 108px;
    }

    .affection-icon {
      position: relative;
      font-size: 14px;
      line-height: 1;
      width: 14px;
      text-align: center;
    }

    .affection-icon .heart-icon {
      position: absolute;
      right: -8px;
      top: -8px;
      width: 12px;
      height: 12px;
      font-size: 11px;
      display: none;
    }

    .affection-meter.maxed .affection-icon .heart-icon {
      display: inline-grid;
    }

    .affection-track {
      width: 60px;
      height: 10px;
      border-radius: 999px;
      background: rgba(56, 34, 18, 0.3);
      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.35), inset 0 0 0 1px rgba(255, 235, 196, 0.1);
    }

    .affection-fill {
      height: 100%;
      min-width: 0;
      border-radius: inherit;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.25);
    }

    .affection-value {
      font-size: 9px;
      color: #fff0d1;
      min-width: 22px;
      text-align: right;
    }

    @keyframes heartPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.22); }
    }

    .scene-area {
      height: calc(100% - var(--hud-h));
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .canvas-wrap {
      flex: 1;
      position: relative;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.18), rgba(255,255,255,0) 35%),
        linear-gradient(180deg, rgba(255,255,255,0.1), rgba(99, 76, 47, 0.08));
    }

    .canvas-wrap::before,
    .canvas-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .canvas-wrap::before {
      background:
        radial-gradient(circle at 50% 100%, rgba(56, 34, 18, 0.22), rgba(56, 34, 18, 0) 36%),
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0) 16%);
    }

    .canvas-wrap::after {
      background:
        linear-gradient(180deg, rgba(37, 18, 7, 0) 62%, rgba(37, 18, 7, 0.14)),
        radial-gradient(circle at 12% 12%, rgba(255,255,255,0.08), rgba(255,255,255,0) 18%);
      mix-blend-mode: multiply;
    }

    #sceneCanvas {
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #dce9bc;
    }

    .dialogue-layer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: min(38%, 260px);
      padding: 10px 16px 28px 12px;
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 10px;
      background:
        linear-gradient(180deg, rgba(82, 55, 30, 0.14), rgba(82, 55, 30, 0.5));
      pointer-events: none;
      z-index: 2;
    }

    .portrait {
      pointer-events: auto;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 8px;
      position: relative;
      overflow: hidden;
    }

    .portrait::before {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 12px;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.5), rgba(255,255,255,0) 38%),
        linear-gradient(180deg, rgba(255, 249, 232, 0.86), rgba(228, 207, 167, 0.96));
    }

    .portrait-card {
      position: relative;
      width: 64px;
      height: 80px;
      border-radius: 12px;
      border: 4px solid rgba(82, 50, 26, 0.78);
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,0.28), rgba(255,255,255,0) 26%),
        linear-gradient(180deg, #ead6b3, #c49e72);
      box-shadow:
        inset 0 8px 0 rgba(255,255,255,0.12),
        0 10px 16px rgba(58, 32, 15, 0.22);
      image-rendering: pixelated;
      overflow: hidden;
      --portrait-hair: #7a593f;
      --portrait-hair-shadow: #59402d;
      --portrait-skin: #f5d6b6;
      --portrait-clothes: #8d7352;
      --portrait-accent: #d8b38d;
      --portrait-bg-1: #f7e7c4;
      --portrait-bg-2: #bc8c5f;
      --portrait-eye: #3e2a1b;
      --portrait-cheek: rgba(220, 123, 122, 0.55);
      --portrait-highlight: rgba(255,255,255,0.18);
      --portrait-shadow: rgba(70, 44, 23, 0.18);
    }

    .portrait-card.narrator {
      display: grid;
      place-items: center;
      font-family: 'Press Start 2P', cursive;
      font-size: 6px;
      line-height: 1.6;
      text-align: center;
      color: #fffaf0;
      text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.25);
      background: linear-gradient(180deg, #9d7b5c, #6f5037);
      overflow: hidden;
      padding: 4px 2px;
      word-break: break-all;
    }

    .portrait-scene {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,0.34), rgba(255,255,255,0) 24%),
        linear-gradient(180deg, var(--portrait-bg-1), var(--portrait-bg-2));
    }

    .portrait-scene::after {
      content: '';
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 0;
      height: 28px;
      background:
        linear-gradient(180deg, rgba(126, 94, 53, 0), rgba(126, 94, 53, 0.16)),
        linear-gradient(180deg, #c99a67, #9c6f45);
      border-top: 2px solid rgba(83, 52, 27, 0.2);
    }

    .portrait-sparkle {
      position: absolute;
      top: 12px;
      right: 10px;
      width: 12px;
      height: 12px;
      transform: rotate(45deg);
      background: rgba(255, 247, 216, 0.78);
      box-shadow:
        0 0 0 2px rgba(255,255,255,0.12),
        0 0 10px rgba(255, 241, 185, 0.42);
      opacity: 0.7;
    }

    .portrait-sparkle::before,
    .portrait-sparkle::after {
      content: '';
      position: absolute;
      inset: 3px;
      background: rgba(255,255,255,0.42);
    }

    .portrait-body {
      position: absolute;
      left: 50%;
      bottom: 11px;
      width: 48px;
      height: 42px;
      transform: translateX(-50%);
      background: var(--portrait-clothes);
      clip-path: polygon(18% 0, 82% 0, 100% 100%, 0 100%);
      box-shadow: inset 0 6px 0 rgba(255,255,255,0.14);
    }

    .portrait-collar {
      position: absolute;
      left: 50%;
      bottom: 38px;
      width: 24px;
      height: 12px;
      transform: translateX(-50%);
      background: var(--portrait-accent);
      clip-path: polygon(0 0, 100% 0, 70% 100%, 30% 100%);
      z-index: 4;
    }

    .portrait-neck {
      position: absolute;
      left: 50%;
      bottom: 43px;
      width: 10px;
      height: 10px;
      transform: translateX(-50%);
      background: #efccab;
      z-index: 4;
    }

    .portrait-head {
      position: absolute;
      left: 50%;
      top: 26px;
      width: 40px;
      height: 44px;
      transform: translateX(-50%);
      z-index: 5;
    }

    .portrait-hair-back,
    .portrait-hair-front {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      background: var(--portrait-hair);
    }

    .portrait-hair-back {
      top: 16px;
      width: 48px;
      height: 50px;
      border-radius: 18px 18px 14px 14px;
      box-shadow: inset 0 -8px 0 var(--portrait-hair-shadow);
    }

    .portrait-hair-front {
      top: 18px;
      width: 44px;
      height: 22px;
      border-radius: 18px 18px 8px 8px;
      clip-path: polygon(0 0, 100% 0, 100% 70%, 74% 84%, 58% 58%, 38% 88%, 20% 62%, 0 76%);
      z-index: 7;
    }

    .portrait-face {
      position: absolute;
      left: 50%;
      top: 24px;
      width: 34px;
      height: 36px;
      transform: translateX(-50%);
      background: var(--portrait-skin);
      border-radius: 14px 14px 16px 16px;
      box-shadow: inset 0 -4px 0 rgba(212, 171, 134, 0.36);
      z-index: 6;
    }

    .portrait-eye {
      position: absolute;
      top: 38px;
      width: 6px;
      height: 7px;
      background: var(--portrait-eye);
      border-radius: 2px;
      z-index: 8;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.18);
    }

    .portrait-eye.left {
      left: 20px;
    }

    .portrait-eye.right {
      right: 20px;
    }

    .portrait-mouth {
      position: absolute;
      left: 50%;
      top: 51px;
      width: 10px;
      height: 4px;
      transform: translateX(-50%);
      border-bottom: 2px solid #8f5e55;
      border-radius: 0 0 10px 10px;
      z-index: 8;
    }

    .portrait-blush {
      position: absolute;
      top: 45px;
      width: 8px;
      height: 4px;
      background: var(--portrait-cheek);
      border-radius: 999px;
      z-index: 7;
      opacity: 0;
    }

    .portrait-blush.left {
      left: 15px;
    }

    .portrait-blush.right {
      right: 15px;
    }

    .portrait-prop {
      position: absolute;
      right: 6px;
      bottom: 18px;
      z-index: 9;
      display: none;
    }

    .portrait-emote {
      position: absolute;
      left: 8px;
      top: 8px;
      font-size: 14px;
      line-height: 1;
      z-index: 9;
      filter: drop-shadow(0 2px 2px rgba(62, 34, 16, 0.24));
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 120ms ease, transform 120ms ease;
    }

    .portrait-label {
      position: absolute;
      left: 4px;
      right: 4px;
      bottom: 3px;
      padding: 1px 4px;
      border-radius: 999px;
      background: rgba(71, 43, 22, 0.78);
      color: #fff6e7;
      text-align: center;
      font-family: 'VT323', monospace;
      font-size: 11px;
      line-height: 1.2;
      z-index: 10;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .portrait-card.heroine .portrait-emote {
      opacity: 1;
      transform: translateY(0);
    }

    .portrait-card.heroine.is-default .portrait-emote,
    .portrait-card.heroine.is-reading .portrait-emote,
    .portrait-card.heroine.is-posing .portrait-emote,
    .portrait-card.heroine.is-battle-ready .portrait-emote,
    .portrait-card.heroine.is-sleepy .portrait-emote {
      opacity: 0.92;
    }

    .portrait-card.heroine.is-blushing .portrait-blush,
    .portrait-card.heroine.is-teary .portrait-blush {
      opacity: 1;
    }

    .portrait-card.heroine.is-happy .portrait-mouth,
    .portrait-card.heroine.is-smiling .portrait-mouth,
    .portrait-card.heroine.is-excited .portrait-mouth {
      width: 12px;
      height: 5px;
      border-bottom-width: 3px;
    }

    .portrait-card.heroine.is-surprised .portrait-mouth {
      width: 6px;
      height: 6px;
      border: 2px solid #8f5e55;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
    }

    .portrait-card.heroine.is-pouty .portrait-mouth {
      width: 10px;
      border-bottom: none;
      border-top: 2px solid #8f5e55;
      border-radius: 10px 10px 0 0;
      top: 53px;
    }

    .portrait-card.heroine.is-reading .portrait-prop.book,
    .portrait-card.heroine.is-default .portrait-prop.book {
      display: block;
    }

    .portrait-card.heroine.is-posing .portrait-prop.camera,
    .portrait-card.heroine.is-smiling .portrait-prop.camera,
    .portrait-card.heroine.is-teary .portrait-prop.camera,
    .portrait-card.heroine.is-pouty .portrait-prop.camera {
      display: block;
    }

    .portrait-card.heroine.is-battle-ready .portrait-prop.sword,
    .portrait-card.heroine.is-excited .portrait-prop.sword,
    .portrait-card.heroine.is-sleepy .portrait-prop.gamepad,
    .portrait-card.heroine.is-blushing .portrait-prop.gamepad {
      display: block;
    }

    .portrait-card.heroine.penny {
      --portrait-hair: #c08958;
      --portrait-hair-shadow: #8d603d;
      --portrait-skin: #f3d8bc;
      --portrait-clothes: #8f6a53;
      --portrait-accent: #d8c7a0;
      --portrait-bg-1: #f7e8cc;
      --portrait-bg-2: #b7875f;
      --portrait-eye: #61412d;
    }

    .portrait-card.heroine.haley {
      --portrait-hair: #e0c26a;
      --portrait-hair-shadow: #b1913c;
      --portrait-skin: #f7dcc2;
      --portrait-clothes: #d79f64;
      --portrait-accent: #fff0cf;
      --portrait-bg-1: #f9e6bf;
      --portrait-bg-2: #d99f6f;
      --portrait-eye: #6d4b2d;
    }

    .portrait-card.heroine.abigail {
      --portrait-hair: #7a66aa;
      --portrait-hair-shadow: #53447d;
      --portrait-skin: #f1d0bc;
      --portrait-clothes: #5f4d88;
      --portrait-accent: #ccbde8;
      --portrait-bg-1: #dfd0f6;
      --portrait-bg-2: #8b74ba;
      --portrait-eye: #3f2f62;
    }

    .portrait-card.heroine.haley .portrait-hair-back {
      width: 50px;
      height: 52px;
      border-radius: 20px 20px 18px 18px;
    }

    .portrait-card.heroine.haley .portrait-hair-front {
      clip-path: polygon(0 0, 100% 0, 100% 76%, 76% 72%, 58% 56%, 40% 78%, 18% 56%, 0 72%);
    }

    .portrait-card.heroine.abigail .portrait-hair-back {
      border-radius: 18px 18px 20px 20px;
    }

    .portrait-card.heroine.abigail .portrait-hair-front {
      clip-path: polygon(0 0, 100% 0, 100% 64%, 78% 86%, 58% 64%, 38% 88%, 18% 64%, 0 74%);
    }

    .portrait-card.heroine.is-reading .portrait-prop.book {
      width: 20px;
      height: 14px;
      background: linear-gradient(90deg, #8f5f3d 0 48%, #dcb38a 48% 52%, #8f5f3d 52% 100%);
      border: 2px solid rgba(81, 51, 27, 0.5);
      border-radius: 3px;
      transform: rotate(-8deg);
    }

    .portrait-card.heroine .portrait-prop.camera {
      width: 17px;
      height: 12px;
      background: #3d373d;
      border-radius: 3px;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.08);
    }

    .portrait-card.heroine .portrait-prop.camera::before {
      content: '';
      position: absolute;
      left: 4px;
      top: 2px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #89a7b6;
      box-shadow: inset 0 0 0 2px #27313b;
    }

    .portrait-card.heroine .portrait-prop.camera::after {
      content: '';
      position: absolute;
      right: 2px;
      top: -3px;
      width: 6px;
      height: 4px;
      border-radius: 2px 2px 0 0;
      background: #514751;
    }

    .portrait-card.heroine .portrait-prop.sword {
      width: 5px;
      height: 24px;
      background: linear-gradient(180deg, #b9d3df, #6d8ba4);
      border-radius: 999px;
      transform: rotate(18deg);
      transform-origin: bottom center;
    }

    .portrait-card.heroine .portrait-prop.sword::before {
      content: '';
      position: absolute;
      left: -4px;
      bottom: 5px;
      width: 13px;
      height: 4px;
      background: #d6b369;
      border-radius: 4px;
    }

    .portrait-card.heroine .portrait-prop.sword::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -5px;
      width: 5px;
      height: 7px;
      background: #7a5c43;
      border-radius: 0 0 2px 2px;
    }

    .portrait-card.heroine .portrait-prop.gamepad {
      width: 18px;
      height: 10px;
      background: #46395f;
      border-radius: 6px;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.08);
    }

    .portrait-card.heroine .portrait-prop.gamepad::before,
    .portrait-card.heroine .portrait-prop.gamepad::after {
      content: '';
      position: absolute;
      top: 3px;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #ccbde8;
    }

    .portrait-card.heroine .portrait-prop.gamepad::before {
      left: 4px;
      box-shadow: 4px 0 0 #ccbde8;
    }

    .portrait-card.heroine .portrait-prop.gamepad::after {
      right: 4px;
      box-shadow: -4px 0 0 #ccbde8;
    }

    .dialogue-panel {
      pointer-events: auto;
      padding: 10px 14px 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-width: 0;
      min-height: 0;
      background:
        linear-gradient(180deg, rgba(255, 251, 240, 0.96), rgba(239, 226, 198, 0.96)),
        repeating-linear-gradient(90deg, rgba(167, 128, 92, 0.04) 0 2px, rgba(255,255,255,0.03) 2px 6px);
    }

    .name-tag {
      align-self: flex-start;
      margin-top: -24px;
      padding: 8px 14px;
      border-radius: 14px 14px 14px 4px;
      background:
        linear-gradient(180deg, #fff7e7, #e9cf9f);
      border: 4px solid rgba(81, 51, 27, 0.76);
      font-family: 'Press Start 2P', cursive;
      font-size: 9px;
      max-width: 100%;
      box-shadow: 0 6px 14px rgba(73, 42, 18, 0.18);
    }

    .dialogue-text {
      flex: 1;
      min-height: 0;
      margin-top: 8px;
      font-size: clamp(20px, 2vw, 30px);
      line-height: 1;
      letter-spacing: 0.02em;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 6px;
      white-space: pre-wrap;
      color: #3b2414;
      text-shadow: none;
      word-break: break-word;
    }

    .dialogue-footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 10px;
      margin-top: 6px;
      font-size: clamp(15px, 1.2vw, 19px);
      flex-wrap: wrap;
    }

    .hint {
      opacity: 0.78;
      color: #5a412e;
    }

    .controls {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
      pointer-events: auto;
    }

    button {
      appearance: none;
      border: none;
      cursor: pointer;
      font: inherit;
      color: var(--ink);
    }

    .wood-button {
      padding: 8px 12px;
      border-radius: 16px;
      background:
        linear-gradient(180deg, #e1bc85, #9d653e),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.06) 0 6px, rgba(85,47,19,0.08) 6px 12px);
      color: #fff7ed;
      border: 3px solid rgba(78, 44, 18, 0.85);
      box-shadow:
        inset 0 2px 0 rgba(255, 234, 198, 0.44),
        0 4px 0 rgba(72, 39, 18, 0.5),
        0 10px 18px rgba(61, 33, 15, 0.15);
      font-family: 'Press Start 2P', cursive;
      font-size: 9px;
      text-transform: uppercase;
      transition: transform 120ms ease, filter 120ms ease, box-shadow 120ms ease;
    }

    .dialogue-footer .wood-button {
      padding: 5px 8px;
      font-size: 7px;
      border-radius: 10px;
      border-width: 2px;
      box-shadow:
        inset 0 1px 0 rgba(255, 234, 198, 0.4),
        0 3px 0 rgba(72, 39, 18, 0.45),
        0 6px 12px rgba(61, 33, 15, 0.12);
    }

    .wood-button:hover,
    .choice-button:hover,
    .slot-card:hover,
    .save-card:hover {
      transform: translateY(-1px);
      filter: saturate(1.05) brightness(1.03);
    }

    .wood-button:active,
    .choice-button:active,
    .slot-card:active,
    .save-card:active {
      transform: translateY(1px);
      box-shadow: inset 0 1px 0 rgba(255, 234, 198, 0.2);
    }

    .choice-panel {
      position: absolute;
      right: 18px;
      bottom: calc(min(34%, 235px) + 12px);
      width: min(380px, calc(100% - 28px));
      display: none;
      gap: 10px;
      flex-direction: column;
      padding: 14px;
      z-index: 5;
      animation: panelRise 180ms ease;
    }

    .choice-panel.visible {
      display: flex;
    }

    .choice-button {
      text-align: left;
      padding: 13px 16px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, #fbf0d6, #ddc08e);
      border: 4px solid rgba(88, 56, 28, 0.82);
      box-shadow:
        0 5px 0 rgba(76, 46, 21, 0.36),
        0 12px 22px rgba(68, 42, 20, 0.15);
      font-size: clamp(20px, 1.8vw, 25px);
      line-height: 1;
      transition: transform 120ms ease, filter 120ms ease, box-shadow 120ms ease;
    }

    .choice-button.focused {
      outline: 3px solid rgba(255,220,160,0.9);
      transform: translateY(-2px);
    }

    .choice-button.chosen {
      background: linear-gradient(180deg,#f6e8b0,#f0c86e);
      transform: scale(0.97);
    }

    .overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.08), rgba(255,255,255,0) 28%),
        rgba(46, 29, 14, 0.54);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
      padding: 16px;
    }

    .overlay.visible {
      display: flex;
    }

    .overlay-panel {
      width: min(900px, 100%);
      max-height: calc(100% - 30px);
      overflow: auto;
      padding: 20px;
      position: relative;
      background:
        linear-gradient(180deg, rgba(252,246,232,0.98), rgba(235,217,184,0.98)),
        repeating-linear-gradient(0deg, rgba(155, 118, 74, 0.05) 0 2px, rgba(255,255,255,0.05) 2px 6px);
    }

    .title-screen {
      text-align: center;
      padding: 40px;
      width: min(720px, 100%);
    }

    .title-heading {
      font-family: 'Press Start 2P', cursive;
      font-size: clamp(14px, 2vw, 22px);
      color: #fff7de;
      text-shadow: 3px 3px 0 #5a3318;
      margin: 0 0 24px;
      line-height: 1.6;
    }

    .title-subcopy {
      margin: 0 0 22px;
      color: #fff6e8;
      font-size: clamp(20px, 1.8vw, 28px);
      text-shadow: 1px 1px 0 rgba(75, 42, 20, 0.7);
    }

    .ending-panel {
      width: min(880px, 100%);
      display: grid;
      grid-template-columns: 152px 1fr;
      gap: 18px;
      align-items: center;
    }

    .ending-portrait {
      width: 120px;
      height: 184px;
      margin: 0 auto;
      position: relative;
      overflow: visible;
    }

    .ending-portrait .portrait-card {
      transform: scale(1.76);
      transform-origin: top left;
      box-shadow: inset 0 8px 0 rgba(255,255,255,0.12), 0 12px 20px rgba(58, 32, 15, 0.28);
    }

    .ending-copy {
      display: grid;
      gap: 12px;
    }

    .ending-copy p {
      margin: 0;
      font-size: clamp(20px, 1.7vw, 28px);
      line-height: 1.05;
    }

    .overlay-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 10px;
    }

    .overlay-title {
      font-family: 'Press Start 2P', cursive;
      font-size: clamp(11px, 1.2vw, 16px);
      color: #5a3921;
      text-shadow: none;
    }

    .overlay-grid {
      display: grid;
      gap: 12px;
    }

    .overlay-grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .save-card,
    .slot-card {
      position: relative;
      overflow: hidden;
      padding: 14px;
      border-radius: 18px;
      border: 4px solid rgba(88, 56, 28, 0.78);
      background:
        linear-gradient(180deg, rgba(251, 243, 222, 0.98), rgba(233, 214, 182, 0.98));
      box-shadow:
        0 5px 0 rgba(74, 46, 23, 0.3),
        0 14px 24px rgba(74, 46, 23, 0.12);
      min-height: 130px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
      transition: transform 120ms ease, filter 120ms ease, box-shadow 120ms ease;
    }

    .save-card::before,
    .slot-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.24), rgba(255,255,255,0) 36%),
        repeating-linear-gradient(0deg, rgba(134, 100, 63, 0.045) 0 2px, rgba(255,255,255,0.04) 2px 8px);
      pointer-events: none;
    }

    .save-card h3,
    .slot-card h3 {
      margin: 0;
      font-family: 'Press Start 2P', cursive;
      font-size: 10px;
      line-height: 1.4;
    }

    .save-card p,
    .slot-card p,
    .overlay-copy {
      margin: 0;
      font-size: clamp(18px, 1.6vw, 24px);
      line-height: 1.05;
    }

    .stats-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      font-size: clamp(16px, 1.3vw, 20px);
    }

    .chip {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(108, 76, 44, 0.08);
      border: 2px solid rgba(88, 56, 28, 0.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35);
    }

    .planner-top {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 14px;
      margin-bottom: 12px;
    }

    .planner-card {
      padding: 16px;
      border-radius: 20px;
      border: 4px solid rgba(88, 56, 28, 0.78);
      background:
        linear-gradient(180deg, rgba(255, 245, 223, 0.98), rgba(234, 215, 184, 0.95));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.48);
    }

    .hero-list {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .hero-card {
      padding: 12px;
      border-radius: 16px;
      border: 3px solid rgba(88, 56, 28, 0.7);
      background: rgba(255, 251, 241, 0.82);
    }

    .hero-card h4 {
      margin: 0 0 8px;
      font-family: 'Press Start 2P', cursive;
      font-size: 11px;
      line-height: 1.5;
    }

    .hero-card p {
      margin: 0;
      font-size: clamp(17px, 1.35vw, 21px);
      line-height: 1;
    }

    .summary-art {
      height: 220px;
      border-radius: 18px;
      border: 4px solid rgba(88, 56, 28, 0.78);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.2), rgba(255,255,255,0)),
        radial-gradient(circle at 50% 20%, rgba(255, 248, 214, 0.9), rgba(255, 248, 214, 0) 30%),
        linear-gradient(180deg, #acd084 0 48%, #93b86b 48% 62%, #7f6b45 62% 100%);
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 10px 30px rgba(255,255,255,0.15);
    }

    .summary-art::before,
    .summary-art::after {
      content: '';
      position: absolute;
      image-rendering: pixelated;
    }

    .summary-art::before {
      left: 15%;
      bottom: 25%;
      width: 120px;
      height: 86px;
      background:
        linear-gradient(180deg, #c67b4a 0 35%, #8b4d2c 35% 100%);
      box-shadow:
        0 -24px 0 0 #d7b161 inset,
        46px -22px 0 -8px #f3e7c8 inset;
    }

    .summary-art::after {
      right: 12%;
      bottom: 18%;
      width: 90px;
      height: 110px;
      background:
        linear-gradient(180deg, #50753f 0 32%, #7f9c4d 32% 100%);
      clip-path: polygon(50% 0, 100% 48%, 82% 48%, 82% 100%, 18% 100%, 18% 48%, 0 48%);
    }

    .log-lines {
      display: grid;
      gap: 8px;
    }

    .log-line {
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 249, 235, 0.86);
      border: 2px solid rgba(88, 56, 28, 0.22);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
      font-size: clamp(18px, 1.5vw, 24px);
      line-height: 1.05;
    }

    .empty-state {
      padding: 24px;
      text-align: center;
      font-size: clamp(18px, 1.5vw, 24px);
      opacity: 0.8;
    }

    .kbd {
      padding: 2px 8px;
      border-radius: 8px;
      background: rgba(63, 42, 23, 0.08);
      border: 2px solid rgba(63, 42, 23, 0.16);
      font-family: 'Press Start 2P', cursive;
      font-size: 10px;
      line-height: 1.6;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.36);
    }

    .dialogue-text::-webkit-scrollbar,
    .overlay-panel::-webkit-scrollbar {
      width: 12px;
    }

    .dialogue-text::-webkit-scrollbar-track,
    .overlay-panel::-webkit-scrollbar-track {
      background: rgba(120, 87, 54, 0.08);
      border-radius: 999px;
    }

    .dialogue-text::-webkit-scrollbar-thumb,
    .overlay-panel::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #d9b27b, #9b663d);
      border-radius: 999px;
      border: 2px solid rgba(255, 245, 223, 0.75);
    }

    @keyframes panelRise {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 960px) {
      body {
        padding: 0;
      }

      .game-shell {
        min-height: 100vh;
        height: 100vh;
        aspect-ratio: auto;
        border-radius: 0;
        border-width: 0;
      }

      .dialogue-layer {
        grid-template-columns: 82px 1fr;
        height: min(38%, 300px);
        padding: 10px 10px 18px;
      }

      .controls {
        justify-content: flex-start;
      }

      .overlay-grid.three,
      .hero-list,
      .planner-top,
      .ending-panel {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="game-shell">

          </div>
        </div>

        <div class="overlay" id="plannerOverlay">

              </div>

        </div>

        <div class="overlay" id="logOverlay">

              <div class="overlay-title">Backlog</div>
              <button class="wood-button" data-close-overlay="logOverlay">Close</button>
            </div>
            <div class="log-lines" id="logLines"></div>
          </div>
        </div>

        <div class="overlay" id="summaryOverlay">
          <div class="overlay-panel wood-frame">
            <div class="overlay-header">
              <div class="overlay-title">Day's End</div>
            </div>
            <div class="planner-top">
              <div class="summary-art" id="summaryArt"></div>
              <div class="planner-card">
                <p class="overlay-copy" id="summaryText"></p>
              </div>
            </div>
            <button class="wood-button" id="summaryContinueBtn">Next Day</button>
          </div>

        <div class="overlay" id="endingOverlay">
          <div class="overlay-panel wood-frame ending-panel" id="endingPanel">

              <div class="overlay-title" id="endingTitle">❤ Route Complete</div>
              <p id="endingHeroineName"></p>
              <p id="endingText"></p>
              <button class="wood-button" id="endingContinueBtn">Back to Town</button>
            </div>
          </div>
        </div>

        <div id="titleOverlay" class="overlay visible">
          <div class="title-screen">
            <h1 class="title-heading">Seasons of Pelican Hearts</h1>
            <p class="title-subcopy">A warm valley romance told one season at a time.</p>
            <button class="wood-button" id="newGameBtn">New Game</button>
            <button class="wood-button" id="continueBtn" style="margin-left:12px">Continue</button>
          </div>
        </div>
      </div>
    </main>
  </div>

    function loadJson(key, fallback) {
      try {
        const value = localStorage.getItem(key);
        return value ? JSON.parse(value) : fallback;
      } catch (error) {

      }

    function saveJson(key, value) {
      localStorage.setItem(key, JSON.stringify(value));

    function ensureAudio() {
      if (state.audioReady) return;
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      state.audioContext = new AudioContext();
      state.audioReady = true;
    }

    function stopBgm() {
      clearTimeout(state.bgmTimer);
      state.bgmNodes.forEach(({ osc, gain }) => {
        try { osc.stop(); } catch (e) {}
        try { gain.disconnect(); } catch (e) {}
      });
      state.bgmNodes = [];
      if (state.bgmDelayNode) {
        try { state.bgmDelayNode.disconnect(); } catch (e) {}
        state.bgmDelayNode = null;
      }
      if (state.bgmWetNode) {
        try { state.bgmWetNode.disconnect(); } catch (e) {}
        state.bgmWetNode = null;
      }
    }

    function playBgm(themeName) {
      if (!themeName) return;
      ensureAudio();
      if (!state.audioReady || state.currentTheme === themeName) return;
      state.currentTheme = themeName;
      stopBgm();
      state.bgmStepIndex = 0;

      const delay = state.audioContext.createDelay(0.4);
      const fbGain = state.audioContext.createGain();
      const wetGain = state.audioContext.createGain();
      delay.delayTime.value = 0.11;
      fbGain.gain.value = 0.28;
      wetGain.gain.value = 0.14;
      delay.connect(fbGain);
      fbGain.connect(delay);
      delay.connect(wetGain);
      wetGain.connect(state.audioContext.destination);
      state.bgmDelayNode = delay;
      state.bgmWetNode = wetGain;

      const CHORD_RATIOS = {
        spring_theme: [1, 1.25, 1.5],
        gentle_afternoon: [1, 1.20, 1.5],
        plaza_breeze: [1, 1.25, 1.5],
        cave_game: [1, 1.20, 1.48],
        dusk_tide: [1, 1.25, 1.5],
        evening_fireflies: [1, 1.25, 1.5]
      };
      const TEMPO = {
        spring_theme: 1.0, gentle_afternoon: 1.35, plaza_breeze: 0.9,
        cave_game: 1.05, dusk_tide: 1.5, evening_fireflies: 1.25
      };

      const melody = MELODIES[themeName] || MELODIES.spring_theme;
      const ratios = CHORD_RATIOS[themeName] || [1, 1.25, 1.5];
      const tempo = TEMPO[themeName] || 1.0;

      const createVoice = (freq, type, gainVal, startT, endT) => {
        const osc = state.audioContext.createOscillator();
        const gn = state.audioContext.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gn.gain.setValueAtTime(0, startT);
        gn.gain.linearRampToValueAtTime(gainVal, startT + 0.02);
        gn.gain.linearRampToValueAtTime(gainVal * 0.7, startT + (endT - startT) * 0.5);
        gn.gain.linearRampToValueAtTime(0, endT);
        osc.connect(gn);
        gn.connect(state.audioContext.destination);
        gn.connect(delay);
        osc.start(startT);
        osc.stop(endT + 0.05);
        state.bgmNodes.push({ osc, gain: gn });
      };

      const playStep = () => {
        if (!state.audioReady || state.currentTheme !== themeName) return;
        const step = melody[state.bgmStepIndex % melody.length];
        const now = state.audioContext.currentTime;
        const dur = step.duration * tempo;
        const humanOffset = (Math.random() - 0.5) * 0.012;
        const t0 = now + humanOffset;
        const t1 = t0 + dur * 0.92;

        createVoice(step.freq, 'triangle', 0.042, t0, t1);
        createVoice(step.freq * ratios[1], 'sine', 0.018, t0, t1);
        createVoice(step.freq * ratios[2], 'sine', 0.014, t0, t1);
        createVoice(step.freq / 2, 'sine', 0.022, t0, t1);
        createVoice(step.freq / 4, 'sine', 0.008, t0, t1 + 0.1);

        state.bgmStepIndex = (state.bgmStepIndex + 1) % melody.length;
        state.bgmTimer = setTimeout(playStep, dur * 1000);
      };
      playStep();
    }

    function typeLine(text) {
      clearTimeout(state.typewriterTimer);
      clearTimeout(state.autoTimer);
      state.isTyping = true;
      state.charIndex = 0;
      state.visibleText = '';
      ui.dialogueText.textContent = '';

      const tick = () => {
        const full = state.currentScene.dialogue[state.dialogueIndex].text;
        if (state.charIndex >= full.length) {
          state.isTyping = false;
          ui.dialogueText.textContent = full;
          scheduleAutoAdvance();
          return;
        }
        state.visibleText += full[state.charIndex];
        state.charIndex += 1;
        ui.dialogueText.textContent = state.visibleText;
        const delay = state.skipMode ? 0 : 30;
        state.typewriterTimer = setTimeout(tick, delay);
      };

      tick();
    }

    function currentChoices() {
      if (!state.currentScene) return null;
      const line = state.currentScene.dialogue[state.dialogueIndex];
      return line.choices || (state.dialogueIndex === state.currentScene.dialogue.length - 1 ? state.currentScene.choices : null);

    function showChoices(choices) {
      state.pendingChoices = choices;
      state.focusedChoiceIndex = 0;
      state.choiceLocked = false;
      ui.choicePanel.innerHTML = '';
      ui.choicePanel.classList.add('visible');
      choices.forEach((choice) => {
        const button = document.createElement('button');
        button.className = 'choice-button';
        button.textContent = choice.text;
        button.addEventListener('mouseenter', () => {
          state.focusedChoiceIndex = [...ui.choicePanel.querySelectorAll('.choice-button')].indexOf(button);
          updateChoiceFocus();
        });
        button.addEventListener('click', () => {
          queueChoiceApply(choice, button);
        });
        ui.choicePanel.appendChild(button);
      });
      updateChoiceFocus();
    }

    function hideChoices() {
      state.pendingChoices = null;
      state.choiceLocked = false;
      ui.choicePanel.classList.remove('visible');
      ui.choicePanel.innerHTML = '';
    }

    function updateChoiceFocus() {
      const buttons = [...ui.choicePanel.querySelectorAll('.choice-button')];
      buttons.forEach((button, index) => {
        button.classList.toggle('focused', index === state.focusedChoiceIndex);
      });
    }

    function moveChoiceFocus(direction) {
      const buttons = ui.choicePanel.querySelectorAll('.choice-button');
      if (!buttons.length) return;
      state.focusedChoiceIndex = (state.focusedChoiceIndex + direction + buttons.length) % buttons.length;
      updateChoiceFocus();
    }

    function queueChoiceApply(choice, button) {
      if (state.choiceLocked) return;
      state.choiceLocked = true;
      button.classList.add('chosen');
      setTimeout(() => {
        button.classList.remove('chosen');
        applyChoice(choice);
      }, 160);
    }

    function applyChoice(choice) {
      markRouteProgress(state.currentScene);
      hideChoices();
      if (choice.heroine && typeof choice.affectionDelta === 'number') {
        state.affection[choice.heroine] = Math.max(0, Math.min(100, state.affection[choice.heroine] + choice.affectionDelta));
        state.daySummary.push(`${HEROES[choice.heroine].name} affection +${choice.affectionDelta}`);
        persistState();
      }
      if (choice.note) {
        state.daySummary.push(choice.note);
      }
      if (state.currentScene?.meta?.progressIndex === 4 && choice.heroine) {
        showEnding(choice.heroine);
        return;
      }
      if (choice.nextScene) {
        loadScene(choice.nextScene);
        return;
      }
      advanceTime();
    }

    function markRouteProgress(scene) {
      if (scene?.meta?.heroine && scene?.meta?.countsForProgress) {
        const heroine = scene.meta.heroine;
        state.routeProgress[heroine] = Math.max(state.routeProgress[heroine], scene.meta.progressIndex + 1);
        persistState();
      }
    }

    function advanceDialogue() {
      if (state.screen !== 'dialogue') return;
      if (completeCurrentLine()) return;
      const line = state.currentScene.dialogue[state.dialogueIndex];
      if (line && !line.logged) {
        pushBacklog(line.speaker, line.text);
        line.logged = true;
      }
      const choices = currentChoices();
      if (choices) {
        showChoices(choices);
        return;
      }
      if (state.dialogueIndex < state.currentScene.dialogue.length - 1) {
        state.dialogueIndex += 1;
        renderDialogueLine();
        return;
      }
      markRouteProgress(state.currentScene);
      if (state.currentScene.next) {
        loadScene(state.currentScene.next);
      } else if (state.currentScene.onComplete === 'advanceTime' || state.currentScene.onComplete === 'planner') {
        advanceTime();
      } else if (state.currentScene.onComplete === 'showPlanner') {
        showPlanner();
      } else {
        showPlanner();
      }
    }

    function clearLoggedFlags(scene) {
      scene.dialogue.forEach((line) => {
        delete line.logged;
      });
    }

    function loadScene(sceneId) {
      hideChoices();
      clearTimeout(state.autoTimer);
      if (state.fading) return;
      state.fading = true;
      const previousScreen = state.screen;
      state.screen = 'transition';

      let alpha = 0;
      const step = 0.1;

      const fadeOut = () => {
        alpha = Math.min(1, alpha + step);
        if (state.currentScene) {
          renderScene();
          drawParticles();
        } else if (previousScreen === 'title') {
          renderTitleCanvas();
        }
        ctx.setTransform(CANVAS_SCALE, 0, 0, CANVAS_SCALE, 0, 0);
        ctx.fillStyle = `rgba(0,0,0,${alpha})`;
        ctx.fillRect(0, 0, VIEW_W, VIEW_H);
        if (alpha < 1) {
          requestAnimationFrame(fadeOut);
          return;
        }

        state.currentSceneId = sceneId;
        state.currentScene = createScene(sceneId);
        clearLoggedFlags(state.currentScene);
        state.dialogueIndex = 0;
        state.screen = 'dialogue';
        state.lastSpeaker = null;
        closeAllOverlays();
        playBgm(state.currentScene.bgm);
        renderDialogueLine();
        updateHud();

        const fadeIn = () => {
          alpha = Math.max(0, alpha - step);
          renderScene();
          drawParticles();
          ctx.setTransform(CANVAS_SCALE, 0, 0, CANVAS_SCALE, 0, 0);
          ctx.fillStyle = `rgba(0,0,0,${alpha})`;
          ctx.fillRect(0, 0, VIEW_W, VIEW_H);
          if (alpha > 0) {
            requestAnimationFrame(fadeIn);
            return;
          }
          state.fading = false;
        };
        requestAnimationFrame(fadeIn);
      };
      requestAnimationFrame(fadeOut);
    }

    function advanceTime() {
      state.timeSlot += 1;
      if (state.timeSlot >= TIMES.length) {
        state.timeSlot = 0;
        showSummary();
      } else {
        showPlanner();
      }
      updateHud();
    }

    function nextDay() {
      state.day += 1;
      if (state.day > 7) {
        state.day = 1;
        state.season = (state.season + 1) % SEASONS.length;
      }
      state.daySummary = [];
      showPlanner();
      updateHud();
    }

    function seasonText() {
      return `${getSeason().name} Day ${state.day}`;
    }

    function showPlanner() {
      const previousScreen = state.screen;
      state.screen = 'transition';
      const buildPlanner = () => {
        state.screen = 'planner';
        hideChoices();
        closeAllOverlays();
        ui.plannerOverlay.classList.add('visible');
        const seasonId = getSeason().id;
        ui.plannerIntroText.textContent = PLANNER_INTROS[seasonId][currentTimeName()];
        ui.plannerSlotText.textContent = `${currentTimeName()} is free. Who would you like to spend time with?`;
        ui.plannerChoices.innerHTML = '';

        Object.entries(HEROES).forEach(([id, hero]) => {
          const nextIndex = state.routeProgress[id];
          const threshold = ROUTE_THRESHOLDS[Math.min(nextIndex, ROUTE_THRESHOLDS.length - 1)];
          const unlocked = state.affection[id] >= threshold;
          const card = document.createElement('button');
          card.className = 'slot-card';
          card.style.borderLeft = `6px solid ${hero.color}`;
          card.innerHTML = `
            <h3>${hero.icon} ${hero.name}</h3>
            <p>${hero.locations.join(' · ')}</p>
            <div class="stats-row">
              <span class="chip">Affection ${state.affection[id]}</span>
              <span class="chip">${nextIndex >= 5 ? 'Route complete' : unlocked ? 'Scene ready' : `Needs ${threshold}`}</span>
            </div>
          `;
          const watermark = document.createElement('div');
          watermark.style.cssText = `
            position:absolute; right:10px; top:8px; font-size:36px;
            opacity:0.15; pointer-events:none; line-height:1; filter:saturate(0);
            user-select:none;
          `;
          watermark.textContent = hero.icon;
          card.appendChild(watermark);
          card.addEventListener('click', () => {
            chooseHeroine(id);
          });
          ui.plannerChoices.appendChild(card);
        });

        renderScene(getPlannerSceneDescriptor());
      };

      let fadeAlpha = 0;
      const fadeOut = () => {
        fadeAlpha += 0.09;
        if (fadeAlpha >= 1) {
          buildPlanner();
          let inAlpha = 1;
          const fadeIn = () => {
            inAlpha -= 0.09;
            if (inAlpha > 0) {
              renderScene(getPlannerSceneDescriptor());
              ctx.setTransform(CANVAS_SCALE, 0, 0, CANVAS_SCALE, 0, 0);
              ctx.fillStyle = `rgba(0,0,0,${inAlpha})`;
              ctx.fillRect(0, 0, VIEW_W, VIEW_H);
              requestAnimationFrame(fadeIn);
            }
          };
          requestAnimationFrame(fadeIn);
          return;
        }
        if (previousScreen === 'title') {
          renderTitleCanvas();
        } else {
          renderScene();
          drawParticles();
        }
        ctx.setTransform(CANVAS_SCALE, 0, 0, CANVAS_SCALE, 0, 0);
        ctx.fillStyle = `rgba(0,0,0,${fadeAlpha})`;
        ctx.fillRect(0, 0, VIEW_W, VIEW_H);
        requestAnimationFrame(fadeOut);
      };
      requestAnimationFrame(fadeOut);
    }

    function showSummary() {
      const previousScreen = state.screen;
      state.screen = 'transition';
      const summaryScene = () => ({
        background: `farm_${getSeason().id}`,
        characters: [],
        caption: 'DAY END FARM VIEW'
      });
      let fadeAlpha = 0;
      const fadeOut = () => {
        fadeAlpha += 0.09;
        if (fadeAlpha >= 1) {
          state.screen = 'summary';
          closeAllOverlays();
          ui.summaryOverlay.classList.add('visible');
          const season = getSeason();
          const notes = state.daySummary.length ? state.daySummary.join('\n') : 'A calm day passed with the wind in the wheat.';
          ui.summaryText.textContent = `${season.icon} ${season.name} · Day ${state.day}\n\n${notes}\n\nTomorrow waits with a fresh pocket of light.`;
          renderScene(summaryScene());
          let inAlpha = 1;
          const fadeIn = () => {
            inAlpha -= 0.09;
            if (inAlpha > 0) {
              renderScene(summaryScene());
              ctx.setTransform(CANVAS_SCALE, 0, 0, CANVAS_SCALE, 0, 0);
              ctx.fillStyle = `rgba(0,0,0,${inAlpha})`;
              ctx.fillRect(0, 0, VIEW_W, VIEW_H);
              requestAnimationFrame(fadeIn);
            }
          };
          requestAnimationFrame(fadeIn);
          return;
        }
        if (previousScreen === 'title') {
          renderTitleCanvas();
        } else {
          renderScene();
          drawParticles();
        }
        ctx.setTransform(CANVAS_SCALE, 0, 0, CANVAS_SCALE, 0, 0);
        ctx.fillStyle = `rgba(0,0,0,${fadeAlpha})`;
        ctx.fillRect(0, 0, VIEW_W, VIEW_H);
        requestAnimationFrame(fadeOut);
      };
      requestAnimationFrame(fadeOut);
    }

    function closeAllOverlays() {
      ui.plannerOverlay.classList.remove('visible');
      ui.saveOverlay.classList.remove('visible');
      ui.logOverlay.classList.remove('visible');
      ui.summaryOverlay.classList.remove('visible');
      ui.endingOverlay.classList.remove('visible');
    }

    function showEnding(heroineId) {
      const hero = HEROES[heroineId];
      closeAllOverlays();
      state.screen = 'ending';
      ui.endingPanel.style.background = `
        linear-gradient(180deg, rgba(252,246,232,0.98), rgba(235,217,184,0.98)),
        linear-gradient(135deg, ${hero.color}33, transparent 45%)
      `;
      ui.endingHeroineName.textContent = `${hero.name}'s Route`;
      ui.endingText.textContent = ENDING_TEXT[heroineId].join('\n\n');
      ui.endingPortrait.innerHTML = `<div class="portrait-card heroine ${heroineId} is-happy">${renderPortraitMarkup(heroineId, 'happy', hero.name, '❤')}</div>`;
      ui.endingOverlay.classList.add('visible');
    }

    function chooseHeroine(heroineId) {
      ensureAudio();
      const routeIndex = state.routeProgress[heroineId];
      const threshold = ROUTE_THRESHOLDS[Math.min(routeIndex, ROUTE_THRESHOLDS.length - 1)];
      if (routeIndex < 5 && state.affection[heroineId] >= threshold) {
        loadScene(routeSceneId(heroineId, routeIndex));
        return;
      }
      const fillerId = `${heroineId}_filler_${currentTimeName().toLowerCase()}`;
      loadScene(fillerId);
    }

    function routeSceneId(heroineId, index) {
      return `${heroineId}_route_${index + 1}`;
    }

    function getPlannerSceneDescriptor() {
      const season = getSeason();
      return {
        background: `farm_${season.id}`,
        characters: [],
        caption: `PLANNER · ${currentTimeName().toUpperCase()}`
      };
    }

    function createScene(sceneId) {
      if (scenes[sceneId]) {
        return structuredClone(scenes[sceneId]);
      }
      if (sceneId.includes('_filler_')) {
        return buildFillerScene(sceneId);
      }
      return structuredClone(scenes.intro);
    }

    function buildFillerScene(sceneId) {
      const heroineId = sceneId.split('_')[0];
      const heroine = HEROES[heroineId];
      const threshold = ROUTE_THRESHOLDS[Math.min(state.routeProgress[heroineId], ROUTE_THRESHOLDS.length - 1)];
      const current = state.affection[heroineId];
      const backgroundMap = {
        penny: 'library_interior',
        haley: 'town_plaza',
        abigail: 'mine_entrance'
      };

      return {
        background: backgroundMap[heroineId],
        bgm: heroineId === 'abigail' ? 'cave_game' : 'gentle_afternoon',
        characters: [{ id: heroineId, position: 'center', state: 'default' }],
        dialogue: [
          { speaker: heroine.name, text: `You share an easy ${currentTimeName().toLowerCase()} with ${heroine.name}, trading small stories and noticing how the season is changing.` },
          { speaker: heroine.name, text: current < threshold ? `A little more time together will help the next special moment bloom. (${current}/${threshold})` : `Even a quiet visit leaves a warm little echo in your chest.` }
        ],
        choices: [
          {
            text: 'Stay a bit longer',
            heroine: heroineId,
            affectionDelta: current < threshold ? 8 : 5,
            note: `You spent ${currentTimeName().toLowerCase()} with ${heroine.name}.`
          },
          {
            text: 'Head back before sunset',
            heroine: heroineId,
            affectionDelta: 4,
            note: `A brief but pleasant visit with ${heroine.name}.`
          }
        ],
        onComplete: 'showPlanner'
      };
    }

    function snapshotGame() {
      return {
        season: state.season,
        day: state.day,
        timeSlot: state.timeSlot,
        currentSceneId: state.currentSceneId,
        affectionMap: state.affection,
        routeProgress: state.routeProgress,
        backlog: state.backlog,
        daySummary: state.daySummary,
        screen: state.screen
      };
    }

    function openSaveLoad(mode) {
      ui.saveTitle.textContent = mode === 'save' ? 'Save Notebook' : 'Load Notebook';
      ui.saveOverlay.dataset.mode = mode;
      ui.saveSlots.innerHTML = '';
      const saves = loadJson(STORAGE_KEYS.saves, [null, null, null]);
      saves.forEach((entry, index) => {
        const card = document.createElement('button');
        card.className = 'save-card';
        if (entry) {
          card.innerHTML = `
            <h3>Slot ${index + 1}</h3>
            <p>${SEASONS[entry.season].name} Day ${entry.day} · ${TIMES[entry.timeSlot]}</p>
            <div class="stats-row">
              <span class="chip">P ${entry.affectionMap.penny}</span>
              <span class="chip">H ${entry.affectionMap.haley}</span>
              <span class="chip">A ${entry.affectionMap.abigail}</span>
            </div>
          `;
        } else {
          card.innerHTML = `<h3>Slot ${index + 1}</h3><p>Empty notebook page</p>`;
        }
        card.addEventListener('click', () => {
          if (mode === 'save') {
            saveToSlot(index);
          } else {
            loadFromSlot(index);
          }
        });
        ui.saveSlots.appendChild(card);
      });
      closeAllOverlays();
      ui.saveOverlay.classList.add('visible');
    }

    function saveToSlot(index) {
      const saves = loadJson(STORAGE_KEYS.saves, [null, null, null]);
      saves[index] = snapshotGame();
      saveJson(STORAGE_KEYS.saves, saves);
      updateContinueButton();
      openSaveLoad('save');
    }

    function loadFromSlot(index) {
      const saves = loadJson(STORAGE_KEYS.saves, [null, null, null]);
      const data = saves[index];
      if (!data) return;
      state.season = data.season;
      state.day = data.day;
      state.timeSlot = data.timeSlot;
      state.affection = data.affectionMap;
      state.routeProgress = data.routeProgress;
      state.backlog = data.backlog || [];
      state.daySummary = data.daySummary || [];
      persistState();
      updateHud();

      if (data.screen === 'planner') {
        showPlanner();
      } else if (data.screen === 'ending') {
        showPlanner();
      } else if (data.screen === 'summary') {
        showSummary();
      } else {
        loadScene(data.currentSceneId || 'intro');
      }
    }

    function latestSaveSlot() {
      const saves = loadJson(STORAGE_KEYS.saves, [null, null, null]);
      let bestIndex = -1;
      let bestScore = -1;
      saves.forEach((entry, index) => {
        if (!entry) return;
        const score = entry.season * 100 + entry.day * 10 + entry.timeSlot;
        if (score > bestScore) {
          bestScore = score;
          bestIndex = index;
        }
      });
      return bestIndex;
    }

    function updateContinueButton() {
      const slot = latestSaveSlot();
      ui.continueBtn.disabled = slot === -1;
      ui.continueBtn.style.opacity = slot === -1 ? '0.4' : '1';
      ui.continueBtn.style.pointerEvents = slot === -1 ? 'none' : 'auto';
    }

    function resetGameState() {
      state.season = 0;
      state.day = 1;
      state.timeSlot = 0;
      state.affection = { penny: 0, haley: 0, abigail: 0 };
      state.routeProgress = { penny: 0, haley: 0, abigail: 0 };
      state.currentSceneId = 'intro';
      state.currentScene = null;
      state.dialogueIndex = 0;
      state.visibleText = '';
      state.charIndex = 0;
      state.isTyping = false;
      state.autoMode = false;
      state.skipMode = false;
      state.backlog = [];
      state.pendingChoices = null;
      state.daySummary = [];
      state.screen = 'title';
      state.currentTheme = null;
      clearTimeout(state.typewriterTimer);
      clearTimeout(state.autoTimer);
      stopBgm();
      persistState();
      updateHud();
    }

    function startNewGame() {
      Object.values(STORAGE_KEYS).forEach((key) => localStorage.removeItem(key));
      resetGameState();
      ui.titleOverlay.classList.remove('visible');
      state.titleVisible = false;
      loadScene('intro');
      updateContinueButton();
    }

    function continueGame() {
      const slot = latestSaveSlot();
      if (slot === -1) return;
      ui.titleOverlay.classList.remove('visible');
      state.titleVisible = false;
      loadFromSlot(slot);
    }

    function renderScene(overrideScene) {
      const scene = overrideScene || state.currentScene || getPlannerSceneDescriptor();
      const season = getSeason();
      const palettes = {
        farm_spring: { sky: '#bfe1a7', far: '#8eb96b', near: '#6f8f4f', panel: '#dcb077' },
        farm_summer: { sky: '#f2de90', far: '#98b65f', near: '#718f44', panel: '#cf995d' },
        farm_autumn: { sky: '#f5c48d', far: '#cb8a4d', near: '#8d5e38', panel: '#ca7746' },
        farm_winter: { sky: '#d8e8f7', far: '#9bbad7', near: '#6e8cae', panel: '#9daec2' },
        farm_morning: { sky: '#c8e4a8', far: '#8db967', near: '#718f48', panel: '#c98a56' },
        library_interior: { sky: '#f0deb3', far: '#ba8a53', near: '#7e552f', panel: '#8f6e4c' },
        schoolhouse: { sky: '#f6e2ac', far: '#d2af73', near: '#896342', panel: '#cb9861' },
        town_plaza: { sky: '#bde0ef', far: '#c1a061', near: '#8d6942', panel: '#d4a36b' },
        photo_studio: { sky: '#f8ecd4', far: '#e1c18a', near: '#977156', panel: '#c79067' },
        mine_entrance: { sky: '#cad5ef', far: '#7885a1', near: '#5f4f61', panel: '#735c76' },
        gaming_room: { sky: '#d3bff0', far: '#8c73b8', near: '#5c4b85', panel: '#8068aa' },
        beach_dusk: { sky: '#f0b695', far: '#8daac0', near: '#546f89', panel: '#d49763' },
        forest_clearing: { sky: '#b7d7b1', far: '#648f58', near: '#496743', panel: '#846746' },
        rooftop_evening: { sky: '#516b9d', far: '#344e76', near: '#263856', panel: '#887aa5' },
        rain_plaza: { sky: '#aab7c8', far: '#7d97af', near: '#506478', panel: '#8b6b72' },
        darkroom: { sky: '#58314d', far: '#352136', near: '#1a111d', panel: '#7c4a61' },
        cave_confession: { sky: '#253252', far: '#3f5882', near: '#1b233a', panel: '#6b85aa' }
      };

      const palette = palettes[scene.background] || palettes[`farm_${season.id}`];
      ctx.setTransform(CANVAS_SCALE, 0, 0, CANVAS_SCALE, 0, 0);
      ctx.clearRect(0, 0, VIEW_W, VIEW_H);
      if (isOutdoorBackground(scene.background)) {
        drawSkyGradient(palette);
        drawSkyBody(scene.background);
      } else {
        ctx.fillStyle = palette.sky;
        ctx.fillRect(0, 0, VIEW_W, 78);
      }
      drawMidground(scene.background, palette);
      const nearGrad = ctx.createLinearGradient(0, 96, 0, 122);
      nearGrad.addColorStop(0, shadeColor(palette.near, 0.08));
      nearGrad.addColorStop(1, palette.near);
      ctx.fillStyle = nearGrad;
      ctx.fillRect(0, 96, VIEW_W, 26);

      const panelGrad = ctx.createLinearGradient(0, 122, 0, 180);
      panelGrad.addColorStop(0, shadeColor(palette.panel, -0.10));
      panelGrad.addColorStop(0.35, palette.panel);
      panelGrad.addColorStop(1, shadeColor(palette.panel, 0.06));
      ctx.fillStyle = panelGrad;
      ctx.fillRect(0, 122, VIEW_W, 58);

      ctx.fillStyle = palette.near;
      for (let gx = 0; gx < 320; gx += 4) {
        const bumpH = (gx % 12 === 0) ? 3 : (gx % 8 === 0) ? 2 : (gx % 6 === 0) ? 1 : 0;
        if (bumpH > 0) ctx.fillRect(gx, 122 - bumpH, 3, bumpH + 1);
      }

      ctx.fillStyle = shadeColor(palette.near, -0.12);
      for (let bx = 2; bx < 318; bx += 6 + (bx % 4)) {
        ctx.fillRect(bx, 118, 1, 5);
      }
      ctx.fillStyle = shadeColor(palette.near, 0.06);
      for (let bx = 5; bx < 316; bx += 9 + (bx % 3)) {
        ctx.fillRect(bx, 119, 1, 3);
      }
      drawGroundDetail(scene.background, palette);

      addAtmosphere(scene, palette);
      drawPlaceholderLandmarks(scene.background, scene);
      drawCharacters(scene.characters || []);
    }

    function isOutdoorBackground(bg) {
      return ['farm_spring', 'farm_summer', 'farm_autumn', 'farm_winter', 'farm_morning', 'town_plaza', 'rain_plaza', 'mine_entrance', 'beach_dusk', 'forest_clearing', 'rooftop_evening'].includes(bg);
    }

    function drawSkyGradient(palette) {
      const grad = ctx.createLinearGradient(0, 0, 0, 78);
      if (state.timeSlot === 0) {
        grad.addColorStop(0, '#f9cfa3');
        grad.addColorStop(0.5, palette.sky);
        grad.addColorStop(1, palette.sky);
      } else if (state.timeSlot === 1) {
        grad.addColorStop(0, '#daf0ff');
        grad.addColorStop(1, palette.sky);
      } else {
        grad.addColorStop(0, '#3c2655');
        grad.addColorStop(0.45, '#c86b3a');
        grad.addColorStop(1, palette.sky);
      }
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, VIEW_W, 78);
    }

    function drawSkyBody(bg) {
      if (!isOutdoorBackground(bg)) return;
      if (state.timeSlot === 0) {
        ctx.fillStyle = '#ffe476';
        ctx.beginPath(); ctx.arc(52, 62, 10, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,235,130,0.22)';
        ctx.beginPath(); ctx.arc(52, 62, 17, 0, Math.PI * 2); ctx.fill();
      } else if (state.timeSlot === 1) {
        ctx.fillStyle = '#fff3a0';
        ctx.beginPath(); ctx.arc(240, 18, 12, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,245,180,0.18)';
        ctx.beginPath(); ctx.arc(240, 18, 20, 0, Math.PI * 2); ctx.fill();
      } else {
        ctx.fillStyle = '#f8f1d8';
        ctx.beginPath(); ctx.arc(248, 22, 9, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#3c2655';
        ctx.beginPath(); ctx.arc(253, 19, 8, 0, Math.PI * 2); ctx.fill();
        [[220, 14], [200, 28], [268, 18], [280, 32]].forEach(([sx, sy]) => {
          ctx.fillStyle = '#f9f1cc';
          ctx.fillRect(sx, sy, 2, 2);
        });
      }
    }

    function drawMidground(bg, palette) {
      if (bg.startsWith('farm_')) {
        const bellW = (r, totalRows, maxHalfW) => {
          const t = r / totalRows;
          return Math.round(maxHalfW * (1 - Math.cos(t * Math.PI * 0.5)));
        };

        const drawSmoothHill = (cx, peakY, baseY, maxHalfW, baseColor, lightMix, darkMix) => {
          const totalRows = baseY - peakY;
          const edgeHighlight = typeof baseColor === 'string' && baseColor.startsWith('#')
            ? shadeColor(baseColor, 0.12)
            : lightMix;
          for (let r = 0; r <= totalRows; r += 1) {
            const hw = bellW(r, totalRows, maxHalfW);
            if (hw < 1) continue;
            const bright = r < totalRows * 0.45 ? lightMix : (r > totalRows * 0.75 ? darkMix : baseColor);
            ctx.fillStyle = bright;
            ctx.fillRect(cx - hw, peakY + r, hw * 2, 1);
            if (r < totalRows * 0.8) {
              ctx.fillStyle = edgeHighlight;
              ctx.fillRect(cx - hw, peakY + r, 1, 1);
            }
          }
          ctx.fillStyle = typeof baseColor === 'string' && baseColor.startsWith('#')
            ? shadeColor(baseColor, -0.18)
            : darkMix;
          ctx.fillRect(cx - maxHalfW, baseY, maxHalfW * 2, 1);
        };

        const hc = palette.far;
        const hL = shadeColor(hc, 0.07);
        const hD = shadeColor(hc, -0.10);
        const hFar = shadeColor(hc, 0.32);
        const hFD = shadeColor(hc, 0.24);

        drawSmoothHill(46, 76, 96, 48, hFar, shadeColor(hc, 0.36), hFD);
        drawSmoothHill(160, 72, 96, 64, hFar, shadeColor(hc, 0.36), hFD);
        drawSmoothHill(274, 74, 96, 50, hFar, shadeColor(hc, 0.36), hFD);

        drawSmoothHill(50, 52, 96, 58, hc, hL, hD);
        drawSmoothHill(160, 42, 96, 80, hc, hL, hD);
        drawSmoothHill(272, 54, 96, 52, hc, hL, hD);

        drawSmoothHill(112, 66, 96, 32, '#7a9e51', hL, hD);
        drawSmoothHill(218, 62, 96, 38, '#7a9e51', hL, hD);
      } else if (bg === 'library_interior' || bg === 'schoolhouse') {
        // landmark handles its own background
      } else if (bg === 'town_plaza' || bg === 'rain_plaza') {
        const buildings = [
          { x: 0, w: 58, y: 44, color: palette.far },
          { x: 56, w: 44, y: 52, color: shadeColor(palette.far, 0.08) },
          { x: 98, w: 66, y: 38, color: palette.far },
          { x: 162, w: 50, y: 48, color: shadeColor(palette.far, -0.06) },
          { x: 210, w: 52, y: 42, color: palette.far },
          { x: 260, w: 60, y: 50, color: shadeColor(palette.far, 0.06) }
        ];
        buildings.forEach((b) => {
          ctx.fillStyle = b.color;
          ctx.fillRect(b.x, b.y, b.w, 96 - b.y);
        });
      } else if (bg === 'mine_entrance') {
        ctx.fillStyle = palette.far;
        ctx.fillRect(0, 52, 86, 44); ctx.fillRect(0, 44, 62, 10); ctx.fillRect(0, 38, 40, 8);
        ctx.fillRect(230, 52, 90, 44); ctx.fillRect(248, 44, 72, 10); ctx.fillRect(266, 38, 54, 8);
        ctx.fillStyle = shadeColor(palette.far, -0.12);
        ctx.fillRect(34, 92, 52, 4);
      } else if (bg === 'beach_dusk') {
        ctx.fillStyle = palette.far;
        ctx.fillRect(0, 72, 320, 18);
        ctx.fillStyle = shadeColor(palette.far, 0.12);
        ctx.fillRect(0, 78, 320, 4);
        ctx.fillStyle = shadeColor(palette.far, -0.08);
        ctx.fillRect(0, 68, 320, 5);
      } else if (bg === 'forest_clearing') {
        ctx.fillStyle = palette.far;
        const treeTops = [
          [0, 36, 52, 38], [40, 28, 48, 50], [78, 34, 44, 44], [114, 24, 56, 54],
          [162, 30, 50, 48], [204, 26, 52, 52], [248, 32, 44, 46], [282, 38, 38, 40]
        ];
        treeTops.forEach(([tx, ty, tw, th]) => { ctx.fillRect(tx, ty, tw, th); });
      } else if (bg === 'rooftop_evening') {
        ctx.fillStyle = shadeColor(palette.far, -0.15);
        const skyline = [

          outfit: '#8f6a53', outfitDark: '#6a4a38', accent: '#d8c7a0',

          }
        },
        abigail: {
          hair: '#7a66aa', hairDark: '#53447d', hairLight: '#9a88cc',
          outfit: '#5f4d88', outfitDark: '#3e3060', accent: '#ccbde8',
          skirt: '#4a3a70', skirtDark: '#32285a',
          eye: '#3f2f62', eyeShape: 'narrow',
          drawHair: (ctx, x, top) => {
            ctx.fillStyle = '#7a66aa';
            ctx.fillRect(x - 11, top + 2, 22, 18);
            ctx.fillRect(x - 12, top + 8, 4, 14);
            ctx.fillRect(x + 8, top + 8, 4, 14);
            ctx.fillRect(x - 8, top - 2, 4, 6);
            ctx.fillRect(x + 4, top - 3, 4, 7);
            ctx.fillRect(x - 2, top - 1, 4, 5);

            ctx.fillStyle = '#53447d';
            ctx.fillRect(x - 12, top + 8, 1, 14);
          }

      };

      characters.forEach((character) => {
        if (!character || !character.id) return;
        const design = DESIGNS[character.id];
        if (!design) return;

        const x = positions[character.position || 'center'] || 160;
        const bottomY = 122;
        const top = bottomY - 66;
        const stateName = String(character.state).toLowerCase();
        const skin = '#f4d8bd';
        const skinMid = '#e8c8a8';
        const skinDark = '#ddb89d';

        ctx.fillStyle = 'rgba(0,0,0,0.20)';
        ctx.beginPath();
        ctx.ellipse(x, bottomY + 2, 12, 3, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#5a4030';
        ctx.fillRect(x - 8, bottomY - 14, 6, 14);
        ctx.fillRect(x + 2, bottomY - 14, 6, 14);
        ctx.fillStyle = '#3a2818';
        ctx.fillRect(x - 10, bottomY - 4, 8, 4);

        ctx.fillStyle = design.skirt;

        ctx.fillRect(x - 11, bottomY - 22, 22, 2);
        ctx.fillRect(x + 9, bottomY - 22, 2, 10);

        ctx.fillStyle = design.outfit;
        ctx.fillRect(x - 8, bottomY - 42, 16, 20);
        ctx.fillStyle = design.outfitDark;
        ctx.fillRect(x + 4, bottomY - 42, 4, 20);
        ctx.fillRect(x - 8, bottomY - 42, 16, 2);

        ctx.fillRect(x - 5, bottomY - 42, 10, 4);

        ctx.fillStyle = design.outfit;
        ctx.fillRect(x - 12, bottomY - 40, 4, 12);
        ctx.fillRect(x + 8, bottomY - 40, 4, 12);
        ctx.fillStyle = skin;
        ctx.fillRect(x - 12, bottomY - 30, 4, 5);
        ctx.fillRect(x + 8, bottomY - 30, 4, 5);

        design.drawHair(ctx, x, top);

        ctx.fillStyle = skin;
        ctx.fillRect(x - 9, top + 6, 18, 22);
        ctx.fillRect(x - 10, top + 10, 20, 12);
        ctx.fillStyle = skinMid;
        ctx.fillRect(x - 9, top + 22, 18, 4);
        ctx.fillStyle = skinDark;
        ctx.fillRect(x + 7, top + 8, 2, 18);

        const eyeY = top + 14;
        ctx.fillStyle = design.eye;
        if (design.eyeShape === 'narrow') {
          ctx.fillRect(x - 7, eyeY, 4, 2);
          ctx.fillRect(x + 3, eyeY, 4, 2);
        } else {
          ctx.fillRect(x - 7, eyeY, 4, 3);
          ctx.fillRect(x + 3, eyeY, 4, 3);
        }
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(x - 7, eyeY, 1, 1);

        ctx.fillRect(x + 3, eyeY - 1, 5, 1);

        ctx.fillStyle = skinDark;
        ctx.fillRect(x - 1, top + 18, 2, 1);

        ctx.strokeStyle = '#8f5e55';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        if (stateName === 'surprised') {
          ctx.arc(x, top + 22, 3, 0, Math.PI * 2);
        } else if (['happy', 'excited', 'smiling'].includes(stateName)) {
          ctx.arc(x, top + 21, 5, 0.1 * Math.PI, 0.9 * Math.PI);
        } else if (stateName === 'pouty') {
          ctx.arc(x, top + 23, 3, 1.1 * Math.PI, 1.9 * Math.PI);

          ctx.arc(x, top + 22, 3, 0.15 * Math.PI, 0.85 * Math.PI);

        if (stateName === 'blushing' || stateName === 'teary') {
          ctx.fillStyle = 'rgba(230,140,140,0.45)';
          ctx.fillRect(x - 11, top + 17, 5, 3);
          ctx.fillRect(x + 6, top + 17, 5, 3);
        }

    function shadeColor(hex, amount) {
      const color = hex.replace('#', '');
      const num = parseInt(color, 16);
      const adjust = (channel) => Math.max(0, Math.min(255, Math.round(channel + 255 * amount)));
      const r = adjust((num >> 16) & 255);
      const g = adjust((num >> 8) & 255);
      const b = adjust(num & 255);
      return `rgb(${r}, ${g}, ${b})`;
    }

    function spawnParticles() {
      if (!isOutdoorBackground(state.currentScene?.background)) return;
      const season = getSeason().id;
      if (season === 'spring') {
        if (Math.random() < 0.18) state.particles.push({
          x: Math.random() * VIEW_W, y: -4,
          vx: 0.3 + Math.random() * 0.4, vy: 0.5 + Math.random() * 0.5,
          w: 3, h: 2, color: Math.random() < 0.5 ? '#f7c5cc' : '#f9e1e6',
          life: 1, type: 'petal'
        });
      } else if (season === 'summer') {
        if (state.timeSlot === 2 && Math.random() < 0.06) state.particles.push({
          x: 30 + Math.random() * 260, y: 40 + Math.random() * 60,
          vx: (Math.random() - 0.5) * 0.2, vy: -0.1,
          w: 2, h: 2, color: '#f9e96a', life: 1, type: 'firefly', alpha: 0
        });
      } else if (season === 'autumn') {
        if (Math.random() < 0.10) state.particles.push({
          x: Math.random() * VIEW_W, y: -4,
          vx: 0.6 + Math.random() * 0.8, vy: 0.4 + Math.random() * 0.6,
          w: 4, h: 3, rot: Math.random() * Math.PI,
          color: ['#d9793a', '#e6a54a', '#c75e30'][Math.floor(Math.random() * 3)],
          life: 1, type: 'leaf'
        });
      } else if (season === 'winter') {
        if (Math.random() < 0.22) state.particles.push({
          x: Math.random() * VIEW_W, y: -3,
          vx: (Math.random() - 0.5) * 0.3, vy: 0.5 + Math.random() * 0.4,
          w: 2, h: 2, color: '#edf4fb', life: 1, type: 'snow'
        });
      }
    }

    function tickParticles() {
      spawnParticles();
      state.particles = state.particles.filter((p) => {
        p.x += p.vx;
        p.y += p.vy;
        if (p.type === 'firefly') {
          p.alpha = Math.sin(Date.now() * 0.003 + p.x) * 0.5 + 0.5;
        }
        return p.y < VIEW_H + 6 && p.x > -8 && p.x < VIEW_W + 6;
      });
    }

    function drawParticles() {
      state.particles.forEach((p) => {
        ctx.globalAlpha = p.type === 'firefly' ? p.alpha * 0.82 : 0.72;
        ctx.fillStyle = p.color;
        ctx.fillRect(Math.round(p.x), Math.round(p.y), p.w, p.h);
      });
      ctx.globalAlpha = 1;
    }

      if (state.screen === 'dialogue') {

        renderScene();
        drawParticles();

        renderTitleCanvas();
      }
      requestAnimationFrame(animationLoop);

    });

      event.currentTarget.textContent = state.skipMode ? 'Skip On' : 'Skip Off';
    });
    document.getElementById('summaryContinueBtn').addEventListener('click', () => {

    document.getElementById('endingContinueBtn').addEventListener('click', () => {

      showPlanner();
    });
    document.getElementById('newGameBtn').addEventListener('click', () => {
      startNewGame();
    });
    document.getElementById('continueBtn').addEventListener('click', () => {
      continueGame();
    });

    document.querySelectorAll('[data-close-overlay]').forEach((button) => {
      button.addEventListener('click', () => {
        document.getElementById(button.dataset.closeOverlay).classList.remove('visible');
      });
    });

    canvas.addEventListener('click', () => {
      if (state.screen === 'dialogue') {
        advanceDialogue();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (ui.choicePanel.classList.contains('visible')) {
        if (event.key === 'ArrowDown' || event.key === 'ArrowRight') {
          event.preventDefault();
          moveChoiceFocus(1);
          return;
        }
        if (event.key === 'ArrowUp' || event.key === 'ArrowLeft') {
          event.preventDefault();
          moveChoiceFocus(-1);
          return;
        }
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          const buttons = [...ui.choicePanel.querySelectorAll('.choice-button')];
          const choice = state.pendingChoices?.[state.focusedChoiceIndex];
          const button = buttons[state.focusedChoiceIndex];
          if (choice && button) {
            queueChoiceApply(choice, button);
          }
          return;
        }
        if (event.key === 'Escape') {
          event.preventDefault();
          return;
        }
      }
      if (event.key === ' ' || event.key === 'Enter') {
        event.preventDefault();
        if (state.screen === 'dialogue') {
          advanceDialogue();
        }
      }
      if (event.key.toLowerCase() === 'l') {
        renderBacklog();
        closeAllOverlays();
        ui.logOverlay.classList.add('visible');
      }
      if (event.key.toLowerCase() === 's') {
        openSaveLoad('save');
      }
    });

    updateContinueButton();
