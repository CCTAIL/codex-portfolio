<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>八字四柱排盘</title>
  <style>
    :root {
      --bg: linear-gradient(160deg, #f8f0d4 0%, #f3e2b4 36%, #e7d29a 100%);
      --paper: rgba(255, 251, 240, 0.9);
      --line: rgba(93, 63, 20, 0.15);
      --text: #392815;
      --muted: #7b6140;
      --wood: #2f9151;
      --fire: #c84234;
      --earth: #c7971e;
      --metal: #ab9460;
      --water: #24518e;
      --gray: #98a0ab;
      --shadow: 0 20px 50px rgba(91, 60, 18, 0.16);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Noto Serif SC", "Songti SC", serif;
      color: var(--text);
      background:
        radial-gradient(circle at left top, rgba(255, 255, 255, 0.42), transparent 28%),
        radial-gradient(circle at right bottom, rgba(171, 132, 45, 0.16), transparent 30%),
        var(--bg);
    }

    .shell {
      width: min(1160px, calc(100% - 28px));
      margin: 24px auto 40px;
    }

    .hero,
    .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .hero {
      padding: 28px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -80px;
      bottom: -80px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(166, 126, 36, 0.25) 0%, rgba(166, 126, 36, 0) 72%);
    }

    .lang-btn {
      position: absolute;
      top: 22px;
      right: 22px;
      padding: 0.3em 0.85em;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.82);
      color: var(--muted);
      font: inherit;
      font-size: 0.88rem;
      cursor: pointer;
      letter-spacing: 0.04em;
      width: auto;
      box-shadow: none;
      transition: background 0.15s;
    }

    .lang-btn:hover {
      background: rgba(240,230,210,0.9);
      transform: none;
      box-shadow: none;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: 0.08em;
    }

    .lead {
      margin: 0;
      max-width: 760px;
      line-height: 1.75;
      color: var(--muted);
    }

    .grid {
      margin-top: 20px;
      display: grid;
      gap: 20px;
      grid-template-columns: 340px 1fr;
      align-items: start;
    }

    .card {
      padding: 22px;
    }

    .card h2,
    .card h3 {
      margin: 0 0 14px;
      font-size: 1.12rem;
      letter-spacing: 0.06em;
    }

    form {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label,
    .inline-title {
      color: var(--muted);
      font-size: 0.95rem;
    }

    input,
    select,
    button {
      width: 100%;
      border-radius: 14px;
      border: 1px solid rgba(120, 82, 27, 0.22);
      background: rgba(255, 255, 255, 0.82);
      color: var(--text);
      font: inherit;
    }

    input,
    select {
      padding: 12px 14px;
    }

    button {
      padding: 13px 16px;
      cursor: pointer;
      background: linear-gradient(135deg, #69491c, #9d7324);
      color: #fff7e6;
      font-weight: 700;
      letter-spacing: 0.08em;
      box-shadow: 0 12px 24px rgba(111, 77, 24, 0.24);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 28px rgba(111, 77, 24, 0.3);
    }

    .radio-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .radio {
      flex: 1 1 120px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(120, 82, 27, 0.18);
    }

    .radio input {
      width: auto;
      margin: 0;
    }

    .actions {
      display: grid;
      gap: 10px;
    }

    .secondary-btn {
      background: rgba(255, 255, 255, 0.78);
      color: var(--text);
      box-shadow: none;
    }

    .hint,
    .note,
    .small {
      color: var(--muted);
      line-height: 1.65;
      font-size: 0.92rem;
    }

    .result-grid {
      display: grid;
      gap: 18px;
    }

    .summary {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .pill,
    .sub-card {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid var(--line);
    }

    .pill strong {
      display: block;
      margin-top: 6px;
      font-size: 1.1rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    .bazi-table th,
    .bazi-table td,
    .luck-table th,
    .luck-table td,
    .tg-table th,
    .tg-table td {
      padding: 11px 8px;
      text-align: center;
      border-bottom: 1px solid rgba(120, 82, 27, 0.12);
    }

    .bazi-table thead th,
    .luck-table thead th,
    .tg-table thead th {
      color: var(--muted);
      font-weight: 600;
    }

    .bazi-table .gan,
    .bazi-table .zhi {
      font-size: 1.55rem;
      font-weight: 700;
    }

    .hidden-stems,
    .element-grid,
    .domain-grid,
    .fact-grid {
      display: grid;
      gap: 12px;
    }

    .hidden-stems {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .element-grid {
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }

    .domain-grid,
    .fact-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .element-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 1.9em;
      padding: 0.2em 0.55em;
      margin: 0.14em 0.18em 0.14em 0;
      border-radius: 999px;
      color: #fff;
      font-weight: 700;
      font-size: 0.94rem;
    }

    .wood { background: var(--wood); }
    .fire { background: var(--fire); }
    .earth { background: var(--earth); }
    .metal { background: var(--metal); }
    .water { background: var(--water); }
    .tag-gold { background: linear-gradient(135deg, #b48b2e, #d6b253); color: #fff; }
    .tag-red { background: linear-gradient(135deg, #bf382f, #d6604e); color: #fff; }
    .tag-orange { background: linear-gradient(135deg, #d06b18, #e1963b); color: #fff; }
    .dim-tag {
      background: var(--gray);
      color: #fff;
    }

    .relation-list,
    .star-list {
      display: grid;
      gap: 10px;
    }

    .relation-item,
    .star-item {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      line-height: 1.7;
    }

    .reading-card {
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.66);
      overflow: hidden;
    }

    .reading-card summary {
      list-style: none;
      cursor: pointer;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-weight: 700;
    }

    .reading-card summary::-webkit-details-marker {
      display: none;
    }

    .reading-card summary span:last-child {
      color: var(--muted);
      font-size: 0.92rem;
      transition: transform 0.2s ease;
    }

    .reading-card[open] summary span:last-child {
      transform: rotate(90deg);
    }

    .reading-content {
      padding: 0 18px 18px;
      border-top: 1px solid rgba(120, 82, 27, 0.12);
      display: grid;
      gap: 14px;
    }

    .reason {
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(235, 224, 196, 0.5);
      border: 1px dashed rgba(120, 82, 27, 0.18);
      line-height: 1.72;
    }

    .section-title {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .level {
      display: inline-flex;
      align-items: center;
      padding: 0.25em 0.7em;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid var(--line);
      font-size: 0.9rem;
    }

    .favorable-row,
    .unfavorable-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .luck-active {
      background: rgba(255, 234, 176, 0.38);
    }

    .validation {
      display: grid;
      gap: 8px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed rgba(120, 82, 27, 0.18);
    }

    .validation-item {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      font-size: 0.92rem;
    }

    .status-ok {
      color: #227845;
      font-weight: 700;
    }

    .status-warn {
      color: #ad5224;
      font-weight: 700;
    }

    .overall {
      line-height: 1.9;
      font-size: 1rem;
    }

    @media (max-width: 960px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .summary,
      .hidden-stems,
      .element-grid,
      .domain-grid,
      .fact-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 680px) {
      .shell {
        width: min(100% - 18px, 100%);
        margin: 18px auto 28px;
      }

      .hero,
      .card {
        padding: 18px;
      }

      .summary,
      .hidden-stems,
      .element-grid,
      .domain-grid,
      .fact-grid {
        grid-template-columns: 1fr;
      }

      .bazi-table .gan,
      .bazi-table .zhi {
        font-size: 1.35rem;
      }

      .validation-item {
        flex-direction: column;
        gap: 4px;
      }
    }

    @media print {
      body {
        background: #fff;
      }

      .shell {
        width: 100%;
        margin: 0;
      }

      .hero,
      .card,
      .reading-card,
      .pill,
      .sub-card {
        box-shadow: none;
        background: #fff;
        backdrop-filter: none;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .actions,
      .validation {
        display: none;
      }

      .reading-card {
        break-inside: avoid;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <button id="lang-btn" class="lang-btn" type="button">EN</button>
      <h1 id="hero-title" data-i18n="title">八字四柱排盘</h1>
      <p id="hero-lead" class="lead" data-i18n="lead">
        以立春定年、以节气定月，支持早子时与晚子时，并在同一张命盘中给出日主强弱、喜用神、十神、格局、大运吉凶与人生领域分析。所有推断均在浏览器内完成，不调用外部接口。
      </p>
    </section>

    <div class="grid">
      <section class="card">
        <h2 data-i18n="inputTitle">输入资料</h2>
        <form id="bazi-form">
          <div class="field">
            <label for="birth-date" data-i18n="labelDate">出生日期（公历）</label>
            <input id="birth-date" name="birthDate" type="date" min="1900-01-01" max="2100-12-31" required>
          </div>

          <div class="field">
            <label for="shichen" data-i18n="labelShichen">出生时辰</label>
            <select id="shichen" name="shichen" required>
              <option value="子">子时（23:00–01:00）</option>
              <option value="丑">丑时（01:00–03:00）</option>
              <option value="寅">寅时（03:00–05:00）</option>
              <option value="卯">卯时（05:00–07:00）</option>
              <option value="辰">辰时（07:00–09:00）</option>
              <option value="巳">巳时（09:00–11:00）</option>
              <option value="午">午时（11:00–13:00）</option>
              <option value="未">未时（13:00–15:00）</option>
              <option value="申">申时（15:00–17:00）</option>
              <option value="酉">酉时（17:00–19:00）</option>
              <option value="戌">戌时（19:00–21:00）</option>
              <option value="亥">亥时（21:00–23:00）</option>
            </select>
          </div>

          <div class="field" id="zi-split-field">
            <div class="inline-title" data-i18n="labelZiSplit">子时分段</div>
            <div class="radio-group">
              <label class="radio">
                <input type="radio" name="ziSplit" value="early" checked>
                <span id="zi-early-label" data-i18n="ziEarly">早子时（23:00–00:00，属当日）</span>
              </label>
              <label class="radio">
                <input type="radio" name="ziSplit" value="late">
                <span id="zi-late-label" data-i18n="ziLate">晚子时（00:00–01:00，属次日）</span>
              </label>
            </div>
          </div>

          <div class="field">
            <div class="inline-title" data-i18n="labelGender">性别</div>
            <div class="radio-group">
              <label class="radio">
                <input type="radio" name="gender" value="male" checked>
                <span id="gender-male-label" data-i18n="genderMale">男命</span>
              </label>
              <label class="radio">
                <input type="radio" name="gender" value="female">
                <span id="gender-female-label" data-i18n="genderFemale">女命</span>
              </label>
            </div>
          </div>

          <div class="actions">
            <button id="calc-btn" type="submit" data-i18n="btnCalculate">开始排盘</button>
            <button id="print-btn" type="button" class="secondary-btn" data-i18n="btnPrint">打印命盘</button>
          </div>
        </form>

        <p id="hint-text" class="hint" data-i18n="hintText">
          年柱以立春为界，月柱按节令交接而非农历月。若选择子时，请按实际出生落点区分早子时与晚子时。
        </p>

        <div class="validation">
          <div class="validation-item">
            <span>1984-02-04 男命</span>
            <span id="check-1984" class="status-warn">校验中</span>
          </div>
          <div class="validation-item">
            <span>1990-01-27</span>
            <span id="check-1990" class="status-warn">校验中</span>
          </div>
          <div class="validation-item">
            <span>2000-02-04</span>
            <span id="check-2000" class="status-warn">校验中</span>
          </div>
          <div class="validation-item">
            <span>1990-10-15 女命（月支戌应属土）</span>
            <span id="check-1990-season" class="status-warn">校验中</span>
          </div>
          <div class="validation-item">
            <span>当前生日校验（今天减 1 天）</span>
            <span id="check-current-luck" class="status-warn">校验中</span>
          </div>
        </div>
      </section>

      <section class="card">
        <div id="results" class="result-grid"></div>
      </section>
    </div>
  </div>

      };
    }

    function monthPillarToIndex(monthPillar) {
      return SIXTY_CYCLE.findIndex(item => item.text === monthPillar.text);
    }

    function getMajorLuck(monthPillarIndex, directionForward, startAge) {
      return Array.from({ length: 8 }, (_, index) => {
        const cycleIndex = mod(monthPillarIndex + (directionForward ? index + 1 : -(index + 1)), 60);
        const ganZhi = SIXTY_CYCLE[cycleIndex];
        const ageStart = Number((startAge + index * 10).toFixed(1));
        const ageEnd = Number((startAge + (index + 1) * 10).toFixed(1));
        return {
          order: index + 1,
          cycleIndex,
          ageStart,
          ageEnd,
          ageRange: `${ageStart} - ${ageEnd}`,
          ganZhi: ganZhi.text,
          stem: ganZhi.stem,
          branch: ganZhi.branch,
          element: `${STEM_ELEMENT[ganZhi.stem]}／${BRANCH_ELEMENT[ganZhi.branch]}`
        };
      });
    }

    function getElementTokens(pillars) {
      return pillars.flatMap(pillar => {
        const mainTokens = [
          { char: pillar.stem, element: STEM_ELEMENT[pillar.stem], type: "天干", position: `${pillar.label}干`, weight: 1, source: "main" },
          { char: pillar.branch, element: BRANCH_ELEMENT[pillar.branch], type: "地支", position: `${pillar.label}支`, weight: 1, source: "main" }
        ];
        const hiddenTokens = HIDDEN_STEMS[pillar.branch].map((stem, index) => ({
          char: stem,
          element: STEM_ELEMENT[stem],
          type: "藏干",
          position: `${pillar.label}支藏干`,
          weight: HIDDEN_WEIGHTS[index] || 0.3,
          source: "hidden",
          branch: pillar.branch
        }));
        return [...mainTokens, ...hiddenTokens];
      });
    }

    function getFullSupportMetrics(pillars, dayStem) {
      const dayElement = STEM_ELEMENT[dayStem];
      const parentElement = getParentElement(dayElement);
      const childElement = getChildElement(dayElement);
      const wealthElement = getWealthElement(dayElement);
      const officerElement = getOfficerElement(dayElement);
      const tokens = getElementTokens(pillars).filter(item => !(item.position === "日干" && item.char === dayStem));
      let support = 0;
      let officer = 0;
      let wealth = 0;
      let output = 0;
      const stemOnly = pillars.flatMap((pillar, index) => {
        const stemTokens = [];
        if (!(index === 2)) {
          stemTokens.push({ element: STEM_ELEMENT[pillar.stem], char: pillar.stem, position: `${pillar.label}干` });
        }
        HIDDEN_STEMS[pillar.branch].forEach(stem => {
          stemTokens.push({ element: STEM_ELEMENT[stem], char: stem, position: `${pillar.label}支藏干` });
        });
        return stemTokens;
      });

      tokens.forEach(token => {
        if ([dayElement, parentElement].includes(token.element)) support += 1;
        if (token.element === officerElement) officer += 1;
        if (token.element === wealthElement) wealth += 1;
        if (token.element === childElement) output += 1;
      });

      const stemElementCounts = stemOnly.reduce((acc, item) => {
        acc[item.element] = (acc[item.element] || 0) + 1;
        return acc;
      }, {});

      return { support, officer, wealth, output, stemElementCounts };
    }

    function getMainHiddenStem(branch) {
      return HIDDEN_STEMS[branch][0];
    }

    function getTenGod(dayStem, targetStem) {
      const dayElement = STEM_ELEMENT[dayStem];
      const targetElement = STEM_ELEMENT[targetStem];
      const samePolarity = STEM_POLARITY[dayStem] === STEM_POLARITY[targetStem];

      if (dayElement === targetElement) {
        return samePolarity ? "比肩" : "劫财";
      }
      if (getChildElement(dayElement) === targetElement) {
        return samePolarity ? "食神" : "伤官";
      }
      if (getWealthElement(dayElement) === targetElement) {
        return samePolarity ? "偏财" : "正财";
      }
      if (getOfficerElement(dayElement) === targetElement) {
        return samePolarity ? "七杀" : "正官";
      }
      return samePolarity ? "偏印" : "正印";
    }

    function getSeasonStrength(dayElement, monthBranch) {
      const seasonElement = SEASON_BRANCH_ELEMENT[monthBranch];
      if (seasonElement === dayElement) {
        return { score: 4, text: lang === "zh" ? `日主${dayElement}得月令当旺` : `Day Master ${labelForElement(dayElement)} is in season.` };
      }
      if (getChildElement(seasonElement) === dayElement) {
        return { score: 3, text: lang === "zh" ? `${seasonElement}旺令生扶日主${dayElement}` : `${labelForElement(seasonElement)} season supports the Day Master.` };
      }
      if (getOfficerElement(dayElement) === seasonElement) {
        return { score: -3, text: lang === "zh" ? `月令${seasonElement}旺而克日主${dayElement}` : `${labelForElement(seasonElement)} season controls the Day Master.` };
      }
      if (getChildElement(dayElement) === seasonElement) {
        return { score: -1, text: lang === "zh" ? `月令使日主${dayElement}泄气` : `The month season drains the Day Master through output.` };
      }
      return { score: -2, text: lang === "zh" ? `月令${seasonElement}为日主${dayElement}之耗星` : `${labelForElement(seasonElement)} works as a draining factor for the Day Master.` };
    }

    function getScoreLabel(score) {
      if (score <= -5) return "极弱";
      if (score <= -1) return "弱";
      if (score <= 3) return "中和";
      if (score <= 7) return "强";
      return "极旺";
    }

    function buildSupportAnalysis(pillars, dayStem) {
      const dayElement = STEM_ELEMENT[dayStem];
      const parentElement = getParentElement(dayElement);
      const officerElement = getOfficerElement(dayElement);
      const childElement = getChildElement(dayElement);
      const wealthElement = getWealthElement(dayElement);
      let supportCount = 0;
      let opposeCount = 0;
      let drainCount = 0;
      let rootCount = 0;
      const notes = [];

      pillars.forEach((pillar, index) => {
        const positions = [
          { name: `${pillar.label}干`, char: pillar.stem, element: STEM_ELEMENT[pillar.stem] },
          { name: `${pillar.label}支`, char: pillar.branch, element: BRANCH_ELEMENT[pillar.branch] }
        ];
        positions.forEach(pos => {
          if (index === 2 && pos.name === "日干") return;
          if ([dayElement, parentElement].includes(pos.element)) {
            supportCount += 1;
            notes.push(lang === "zh" ? `${pos.name}${pos.char}属${pos.element}，为生扶` : `${pos.name} ${pos.char} is ${labelForElement(pos.element)}, so it supports the Day Master`);
          } else if (pos.element === officerElement) {
            opposeCount += 1;
            notes.push(lang === "zh" ? `${pos.name}${pos.char}属${pos.element}，直接克身` : `${pos.name} ${pos.char} is ${labelForElement(pos.element)}, directly controlling the Day Master`);
          } else if ([childElement, wealthElement].includes(pos.element)) {
            drainCount += 1;
            notes.push(lang === "zh" ? `${pos.name}${pos.char}属${pos.element}，对日主有泄耗` : `${pos.name} ${pos.char} is ${labelForElement(pos.element)}, draining the Day Master`);
          }
        });

        const hidden = HIDDEN_STEMS[pillar.branch];
        if (hidden.some(stem => STEM_ELEMENT[stem] === dayElement) || hidden.includes(dayStem)) {
          rootCount += 1;
        }
      });

      return { supportCount, opposeCount, drainCount, rootCount, notes };
    }

    function analyzeStrength(pillars, dayStem, monthBranch) {
      const dayElement = STEM_ELEMENT[dayStem];
      const season = getSeasonStrength(dayElement, monthBranch);
      const support = buildSupportAnalysis(pillars, dayStem);
      const totalScore = Number((season.score + support.supportCount * 1.2 + support.rootCount * 1.4 - support.opposeCount * 1.3 - support.drainCount * 0.7).toFixed(1));
      const label = getScoreLabel(totalScore);
      const reason = lang === "zh"
        ? `日主${dayStem}${dayElement}，月支${monthBranch}属${SEASON_BRANCH_ELEMENT[monthBranch]}，${season.text}；盘中生扶 ${support.supportCount} 处、通根 ${support.rootCount} 处、克身 ${support.opposeCount} 处、泄耗 ${support.drainCount} 处，因此判断为${label}。`
        : `Day Master ${dayStem} (${labelForElement(dayElement)}), month branch ${monthBranch} carries ${labelForElement(SEASON_BRANCH_ELEMENT[monthBranch])}. ${season.text} Support ${support.supportCount}, roots ${support.rootCount}, clash ${support.opposeCount}, drain ${support.drainCount}; overall assessment: ${t(`strengthLabels.${label}`)}.`;
      return {
        totalScore,
        label,
        dayStem,
        dayElement,
        season,
        ...support,
        reason,
        isStrong: totalScore >= 4,
        isWeak: totalScore <= -1
      };
    }

    function analyzeUsefulGods(strength) {
      const dayElement = strength.dayElement;
      const same = dayElement;
      const parent = getParentElement(dayElement);
      const child = getChildElement(dayElement);
      const wealth = getWealthElement(dayElement);
      const officer = getOfficerElement(dayElement);
      let favorable = [];
      let unfavorable = [];
      let explanation = "";

      if (strength.label === "强" || strength.label === "极旺") {
        favorable = [officer, child, wealth];
        unfavorable = [same, parent];
        explanation = lang === "zh"
          ? `日主偏旺，按扶抑法宜取克泄耗为用，先用${officer}制身，再借${child}泄秀、以${wealth}耗身；${same}与${parent}继续生扶，反而加重偏旺。`
          : `The Day Master is on the strong side, so regulation should come through control, output, and wealth: ${labelForElement(officer)} controls, ${labelForElement(child)} vents, and ${labelForElement(wealth)} consumes; ${labelForElement(same)} and ${labelForElement(parent)} would only strengthen the existing excess.`;
      } else if (strength.label === "弱" || strength.label === "极弱") {
        favorable = [same, parent];
        unfavorable = [officer, wealth, child];
        explanation = lang === "zh"
          ? `日主偏弱，按扶抑法宜取生扶为先，以${same}比劫助身、以${parent}印星生身；${officer}、${wealth}与${child}会继续克泄耗身，应列为忌神。`
          : `The Day Master is on the weak side, so support comes first: ${labelForElement(same)} strengthens directly and ${labelForElement(parent)} nourishes through Resource; ${labelForElement(officer)}, ${labelForElement(wealth)}, and ${labelForElement(child)} would further control or drain the chart.`;
      } else {
        favorable = [officer, wealth];
        unfavorable = [same];
        explanation = lang === "zh"
          ? `原局接近中和，可用${officer}与${wealth}帮助结构落地、形成事业与财务约束；${same}过多则会使同党偏聚，平衡感下降。`
          : `The chart is relatively balanced, so ${labelForElement(officer)} and ${labelForElement(wealth)} help anchor structure in career and finance, while too much ${labelForElement(same)} would tip the chart toward excess self-grouping.`;
      }

      return {
        favorable: [...new Set(favorable)],
        unfavorable: [...new Set(unfavorable)],
        baseFavorable: [...new Set(favorable)],
        baseUnfavorable: [...new Set(unfavorable)],
        explanation
      };
    }

    function buildTenGodEntries(calc) {
      const dayStem = calc.dayPillar.stem;
      const pillars = [
        { key: "年干", char: calc.yearPillar.stem, type: "天干" },
        { key: "年支", char: getMainHiddenStem(calc.yearPillar.branch), raw: calc.yearPillar.branch, type: "地支主气" },
        { key: "月干", char: calc.monthPillar.stem, type: "天干" },
        { key: "月支", char: getMainHiddenStem(calc.monthPillar.branch), raw: calc.monthPillar.branch, type: "地支主气" },
        { key: "日支", char: getMainHiddenStem(calc.dayPillar.branch), raw: calc.dayPillar.branch, type: "地支主气" },
        { key: "时干", char: calc.hourPillar.stem, type: "天干" },
        { key: "时支", char: getMainHiddenStem(calc.hourPillar.branch), raw: calc.hourPillar.branch, type: "地支主气" }
      ];
      return pillars.map(item => {
        const tenGod = getTenGod(dayStem, item.char);
        return {
          ...item,
          tenGod,
          desc: TEN_GOD_DESC[tenGod]
        };
      });
    }

    function getRelationPillars(calc) {
      return [
        { label: "年", stem: calc.yearPillar.stem, branch: calc.yearPillar.branch },
        { label: "月", stem: calc.monthPillar.stem, branch: calc.monthPillar.branch },
        { label: "日", stem: calc.dayPillar.stem, branch: calc.dayPillar.branch },
        { label: "时", stem: calc.hourPillar.stem, branch: calc.hourPillar.branch }
      ];
    }

    function isSeasonSupportingElement(monthBranch, element) {
      const seasonElement = SEASON_BRANCH_ELEMENT[monthBranch];
      return seasonElement === element || getChildElement(seasonElement) === element;
    }

    function detectGanZhiRelations(calc) {
      const pillars = getRelationPillars(calc);
      const relations = [];

      for (let i = 0; i < pillars.length; i += 1) {
        for (let j = i + 1; j < pillars.length; j += 1) {
          const left = pillars[i];
          const right = pillars[j];
          const stemCombo = STEM_COMBINATIONS.find(item => item.pair.includes(left.stem) && item.pair.includes(right.stem));
          if (stemCombo) {
            const transformed = isSeasonSupportingElement(calc.monthPillar.branch, stemCombo.element);
            relations.push({
              kind: "合",
              tagClass: "tag-gold",
              title: t("relationTitles.stemCombineTitle", { left: left.label, leftS: left.stem, right: right.label, rightS: right.stem }),
              detail: transformed ? t("relationDetails.stemCombine_transformed", { element: labelForElement(stemCombo.element) }) : t("relationDetails.stemCombine_untransformed")
            });
          }
          if (BRANCH_SIX_HARMONY.some(item => item.pair.includes(left.branch) && item.pair.includes(right.branch))) {
            const combo = BRANCH_SIX_HARMONY.find(item => item.pair.includes(left.branch) && item.pair.includes(right.branch));
            relations.push({
              kind: "合",
              tagClass: "tag-gold",
              title: t("relationTitles.branchHarmonyTitle", { left: left.label, leftB: left.branch, right: right.label, rightB: right.branch }),
              detail: t("relationDetails.branchHarmony", { element: labelForElement(combo.element) })
            });
          }
          if (BRANCH_SIX_CLASH.some(pair => pair.includes(left.branch) && pair.includes(right.branch))) {
            relations.push({
              kind: "冲",
              tagClass: "tag-red",
              title: t("relationTitles.branchClashTitle", { left: left.label, leftB: left.branch, right: right.label, rightB: right.branch }),
              detail: t("relationDetails.branchClash", { left: left.label, right: right.label })
            });
          }
        }
      }

      BRANCH_PUNISHMENTS.forEach(rule => {
        if (rule.type === "triple") {
          const hit = pillars.filter(item => rule.branches.includes(item.branch));
          if (hit.length >= 2) {
            relations.push({
              kind: "刑",
              tagClass: "tag-orange",
              title: t("relationTitles.tripleHarmonyTitle", { label: rule.label }),
              detail: t("relationDetails.triplePunish", { hit: hit.map(item => `${item.label}${lang === "zh" ? "支" : ""}${item.branch}`).join(lang === "zh" ? "、" : ", ") })
            });
          }
        } else if (rule.type === "pair") {
          const hit = pillars.filter(item => rule.branches.includes(item.branch));
          if (hit.length === 2) {
            relations.push({
              kind: "刑",
              tagClass: "tag-orange",
              title: `${rule.label}`,
              detail: t("relationDetails.pairPunish", { hit: hit.map(item => `${item.label}${lang === "zh" ? "支" : ""}${item.branch}`).join(lang === "zh" ? "与" : " and ") })
            });
          }
        } else if (rule.type === "self") {
          const hit = pillars.filter(item => item.branch === rule.branches[0]);
          if (hit.length >= 2) {
            relations.push({
              kind: "刑",
              tagClass: "tag-orange",
              title: `${rule.label}`,
              detail: t("relationDetails.selfPunish", { hit: hit.map(item => `${item.label}${lang === "zh" ? "支" : ""}${item.branch}`).join(lang === "zh" ? "、" : ", ") })
            });
          }
        }
      });

      return relations;
    }

    function detectSpecialStars(calc) {
      const pillars = getRelationPillars(calc);
      const stars = [];
      const branches = pillars.map(item => item.branch);
      const branchByLabel = pillars.reduce((acc, item) => ({ ...acc, [item.label]: item.branch }), {});
      const dayStem = calc.dayPillar.stem;

      const tianYiTargets = TIAN_YI_GUI_REN[dayStem] || [];
      const tianYiHits = pillars.filter(item => tianYiTargets.includes(item.branch));
      if (tianYiHits.length) {
        stars.push({
          name: "天乙贵人",
          trigger: tianYiHits.map(item => `${item.label}支${item.branch}`).join("、"),
          detail: t("starDetails.天乙贵人")
        });
      }

      const wenChangTarget = WEN_CHANG[dayStem];
      const wenChangHits = pillars.filter(item => item.branch === wenChangTarget);
      if (wenChangHits.length) {
        stars.push({
          name: "文昌贵人",
          trigger: wenChangHits.map(item => `${item.label}支${item.branch}`).join("、"),
          detail: t("starDetails.文昌贵人")
        });
      }

      [
        { source: "年支", branch: calc.yearPillar.branch },
        { source: "日支", branch: calc.dayPillar.branch }
      ].forEach(item => {
        const group = PEACH_GROUPS.find(groupItem => groupItem.group.includes(item.branch));
        if (group) {
          const hits = pillars.filter(pillar => pillar.branch === group.peach);
          if (hits.length) {
            stars.push({
              name: "桃花",
              trigger: `${item.source}${item.branch}引动，命局见${hits.map(hit => `${hit.label}支${hit.branch}`).join("、")}`,
              detail: t("starDetails.桃花")
            });
          }
        }
      });

      [
        { source: "年支", branch: calc.yearPillar.branch },
        { source: "日支", branch: calc.dayPillar.branch }
      ].forEach(item => {
        const group = YI_MA_GROUPS.find(groupItem => groupItem.group.includes(item.branch));
        if (group) {
          const hits = pillars.filter(pillar => pillar.branch === group.horse);
          if (hits.length) {
            stars.push({
              name: "驿马",
              trigger: `${item.source}${item.branch}引动，命局见${hits.map(hit => `${hit.label}支${hit.branch}`).join("、")}`,
              detail: t("starDetails.驿马")
            });
          }
        }
      });

      const bladeTarget = BLADE_BRANCH[dayStem];
      const bladeHits = pillars.filter(item => item.branch === bladeTarget);
      if (bladeHits.length) {
        stars.push({
          name: "羊刃",
          trigger: bladeHits.map(item => `${item.label}支${item.branch}`).join("、"),
          detail: t("starDetails.羊刃")
        });
      }

      return stars;
    }

    function countTenGods(calc) {
      const stems = [
        calc.yearPillar.stem,
        calc.monthPillar.stem,
        calc.hourPillar.stem,
        ...HIDDEN_STEMS[calc.yearPillar.branch],
        ...HIDDEN_STEMS[calc.monthPillar.branch],
        ...HIDDEN_STEMS[calc.dayPillar.branch],
        ...HIDDEN_STEMS[calc.hourPillar.branch]
      ];
      return stems.reduce((acc, stem) => {
        const god = getTenGod(calc.dayPillar.stem, stem);
        acc[god] = (acc[god] || 0) + 1;
        return acc;
      }, {});
    }

    function detectPattern(calc, strength) {
      const dayStem = calc.dayPillar.stem;
      const monthBranch = calc.monthPillar.branch;
      const monthMainStem = getMainHiddenStem(monthBranch);
      const metrics = getFullSupportMetrics(calc.pillars || getRelationPillars(calc), dayStem);
      const dayElement = STEM_ELEMENT[dayStem];
      const childElement = getChildElement(dayElement);
      const wealthElement = getWealthElement(dayElement);
      const officerElement = getOfficerElement(dayElement);
      let pattern = "";
      let detail = "";
      let special = "";
      let overrideUsefulGods = null;

      const noOfficerWealthOutputInStems =
        (metrics.stemElementCounts[officerElement] || 0) === 0 &&
        (metrics.stemElementCounts[wealthElement] || 0) === 0 &&
        (metrics.stemElementCounts[childElement] || 0) === 0;

      if (metrics.support >= 5 && noOfficerWealthOutputInStems) {
        pattern = "从强格";
        detail = t("patternDesc.从强格");
        special = lang === "zh" ? "从强格喜比劫印星，忌见官财食伤入运，一旦行运逆势，往往先出现节奏失衡。" : "Following Strength prefers Peer and Resource energy; Officer, Wealth, and Output can disrupt the pattern when luck runs against it.";
        overrideUsefulGods = {
          favorable: [dayElement, getParentElement(dayElement)],
          unfavorable: [officerElement, wealthElement, childElement],
          explanation: lang === "zh" ? `命局呈从强格，不能再按普通扶抑法削身，宜顺其旺势，取${dayElement}、${getParentElement(dayElement)}为助力，忌${officerElement}、${wealthElement}、${childElement}破局。` : `This chart follows strength, so the usual balancing method is overridden. Support ${labelForElement(dayElement)} and ${labelForElement(getParentElement(dayElement))}; avoid ${labelForElement(officerElement)}, ${labelForElement(wealthElement)}, and ${labelForElement(childElement)}.`
        };
      } else if (metrics.support <= 1 && metrics.officer >= 4) {
        pattern = "从杀格";
        detail = t("patternDesc.从杀格");
        special = lang === "zh" ? "从杀格喜官杀财星，忌再见比劫印星强扶，否则容易形成逆局。" : "Following Killings prefers Officer/Killing and Wealth energy; too much Peer or Resource reverses the pattern.";
        overrideUsefulGods = {
          favorable: [officerElement, wealthElement],
          unfavorable: [dayElement, getParentElement(dayElement)],
          explanation: lang === "zh" ? `命局呈从杀格，应顺从官杀气势，宜取${officerElement}、${wealthElement}，忌${dayElement}与${getParentElement(dayElement)}逆势扶身。` : `This chart follows Officer/Killing energy, so ${labelForElement(officerElement)} and ${labelForElement(wealthElement)} are favorable, while ${labelForElement(dayElement)} and ${labelForElement(getParentElement(dayElement))} work against the pattern.`
        };
      } else if (metrics.support <= 1 && metrics.output >= 4) {
        pattern = "从儿格";
        detail = t("patternDesc.从儿格");
        special = lang === "zh" ? "从儿格喜食伤，其次喜财；若比印过多回头扶身，反使格局不纯。" : "Following Output prefers Output first and Wealth second; too much Peer or Resource muddies the pattern.";
        overrideUsefulGods = {
          favorable: [childElement, wealthElement],
          unfavorable: [dayElement, getParentElement(dayElement), officerElement],
          explanation: lang === "zh" ? `命局呈从儿格，宜顺食伤之势，以${childElement}为先、${wealthElement}为辅，忌比印与官杀回头打断输出节奏。` : `This chart follows Output, so ${labelForElement(childElement)} is primary and ${labelForElement(wealthElement)} secondary; Peer, Resource, and Officer energy interrupt that flow.`
        };
      } else if (metrics.support <= 1 && metrics.wealth >= 4) {
        pattern = "从财格";
        detail = t("patternDesc.从财格");
        special = lang === "zh" ? "从财格喜财与食伤，忌比印过强回身夺财。" : "Following Wealth prefers Wealth and Output; too much Peer or Resource pulls the chart back from pure wealth following.";
        overrideUsefulGods = {
          favorable: [wealthElement, childElement],
          unfavorable: [dayElement, getParentElement(dayElement), officerElement],
          explanation: lang === "zh" ? `命局呈从财格，应顺财势与流通之气，取${wealthElement}、${childElement}为用，忌比印强扶导致争财失衡。` : `This chart follows Wealth, so ${labelForElement(wealthElement)} and ${labelForElement(childElement)} are favorable, while Peer and Resource energy can create competition over wealth.`
        };
      } else if (LU_BRANCH[dayStem] === monthBranch) {
        pattern = "建禄格";
      } else if (BLADE_BRANCH[dayStem] === monthBranch) {
        pattern = "月刃格";
      } else {
        const monthGod = getTenGod(dayStem, monthMainStem);
        const map = {
          正官: "正官格",
          七杀: "七杀格",
          正印: "正印格",
          偏印: "偏印格",
          食神: "食神格",
          伤官: "伤官格",
          正财: "正财格",
          偏财: "偏财格"
        };
        pattern = map[monthGod] || "杂气格";
      }

      if (!detail) {
        detail = t(`patternDesc.${pattern}`) || (lang === "zh" ? "月令杂气并见，需要结合日主强弱与用神综合看，不宜单凭一神定全局。" : "Multiple energies mix within the month branch, so the chart should be read holistically with Day Master strength and Useful Gods.");
      }

      if (!overrideUsefulGods && (strength.label === "极旺" || strength.label === "强") && strength.supportCount >= 5 && strength.opposeCount === 0) {
        special = "原局同党成群、官财不显，可参考从强格倾向，但仍需看后续行运是否继续顺势。";
      } else if (!overrideUsefulGods && (strength.label === "极弱" || strength.label === "弱") && strength.supportCount <= 1 && strength.opposeCount >= 3) {
        special = "原局克泄偏多、生扶不足，可参考从弱格倾向，遇到再扶身之运时反而会出现拉扯。";
      }

      const chain = lang === "zh"
        ? `月支${monthBranch}藏干以${monthMainStem}为主，和日主${dayStem}形成${pattern.replace("格", "")}取象；再结合日主${strength.label}，判断此格局的成立度与层次。`
        : `The month branch ${monthBranch} uses ${monthMainStem} as its primary hidden stem, which forms the ${labelForPattern(pattern)} pattern relative to Day Stem ${dayStem}. This is then adjusted by the Day Master's ${t(`strengthLabels.${strength.label}`)} condition.`;
      return { pattern, detail, special, chain, overrideUsefulGods, supportMetrics: metrics };
    }

    function scoreLuckByUsefulGod(dayStem, favorable, unfavorable, cycle) {
      const stemElement = STEM_ELEMENT[cycle.stem];
      const branchElement = BRANCH_ELEMENT[cycle.branch];
      let score = 0;
      if (favorable.includes(stemElement)) score += 2;
      if (favorable.includes(branchElement)) score += 1.5;
      if (unfavorable.includes(stemElement)) score -= 2;
      if (unfavorable.includes(branchElement)) score -= 1.5;
      const tenGod = getTenGod(dayStem, cycle.stem);
      if (["正官", "正财", "食神", "正印"].includes(tenGod)) score += 0.6;
      if (["七杀", "伤官"].includes(tenGod)) score -= 0.6;
      return { score: Number(score.toFixed(1)), tenGod };
    }

    function rateLuck(score) {
      if (score >= 3) return "大吉";
      if (score >= 1.5) return "吉";
      if (score > -1.5) return "平";
      if (score > -3) return "凶";
      return "大凶";
    }

    function getLuckNote(calc, cycle, rating, usefulGods) {
      const dayStem = calc.dayPillar.stem;
      const tenGod = getTenGod(dayStem, cycle.stem);
      const stemElement = STEM_ELEMENT[cycle.stem];
      const branchElement = BRANCH_ELEMENT[cycle.branch];
      const favorableHit = usefulGods.favorable.filter(el => [stemElement, branchElement].includes(el));
      const unfavorableHit = usefulGods.unfavorable.filter(el => [stemElement, branchElement].includes(el));
      let note = t("luckNoteBase", { tenGod: labelForTenGod(tenGod), branchEl: labelForElement(branchElement) });

      if (rating === "大吉" || rating === "吉") {
        note += favorableHit.length
          ? ` ${t("luckNoteGood_hit", { favorable: favorableHit.map(labelForElement).join(lang === "zh" ? "、" : ", ") })}`
          : ` ${t("luckNoteGood_miss")}`;
      } else if (rating === "平") {
        note += ` ${t("luckNoteNeutral")}`;
      } else {
        note += unfavorableHit.length
          ? ` ${t("luckNoteBad_hit", { unfavorable: unfavorableHit.map(labelForElement).join(lang === "zh" ? "、" : ", ") })}`
          : ` ${t("luckNoteBad_miss")}`;
      }

      const pillars = getRelationPillars(calc);
      const stemComboHits = pillars.filter(pillar => STEM_COMBINATIONS.some(item => item.pair.includes(cycle.stem) && item.pair.includes(pillar.stem)));
      stemComboHits.forEach(hit => {
        const combo = STEM_COMBINATIONS.find(item => item.pair.includes(cycle.stem) && item.pair.includes(hit.stem));
        note += ` ${t("luckNoteCombo", { comboTarget: `${hit.label}${lang === "zh" ? "干" : " stem"}${hit.stem}`, comboEl: labelForElement(combo.element) })}`;
      });
      const clashHit = pillars.find(pillar => CLASH_BRANCH[cycle.branch] === pillar.branch);
      if (clashHit) {
        note += ` ${t("luckNoteClash", { clashLabel: `${clashHit.label}${lang === "zh" ? "支" : " pillar"}${clashHit.branch}` })}`;
      }

      return { tenGod, note };
    }

    function getCurrentAge(birthDate, asOfDate = new Date()) {
      const birthdayThisYear = new Date(asOfDate.getFullYear(), birthDate.month - 1, birthDate.day);
      return asOfDate.getFullYear() - birthDate.year - (asOfDate < birthdayThisYear ? 1 : 0);
    }

    function getCurrentLuckIndex(calc, asOfDate = new Date()) {
      const age = getCurrentAge(calc.birthDate, asOfDate);
      return calc.majorLuck.findIndex(item => age >= item.ageStart && age < item.ageEnd);
    }

    function assessLuckCycles(calc, usefulGods) {
      const currentIndex = getCurrentLuckIndex(calc);
      return calc.majorLuck.map((cycle, index) => {
        const base = scoreLuckByUsefulGod(calc.dayPillar.stem, usefulGods.favorable, usefulGods.unfavorable, cycle);
        const rating = rateLuck(base.score);
        const note = getLuckNote(calc, cycle, rating, usefulGods);
        return {
          ...cycle,
          score: base.score,
          rating,
          stemTenGod: note.tenGod,
          note: note.note,
          isCurrent: index === currentIndex
        };
      });
    }

    function getDominantTenGod(tenGodCounts) {
      return Object.entries(tenGodCounts).sort((a, b) => b[1] - a[1])[0]?.[0] || "比肩";
    }

    function getElementStats(pillars) {
      const tokens = getElementTokens(pillars);
      const mainCounts = ELEMENT_LABELS.reduce((acc, key) => ({ ...acc, [key]: 0 }), {});
      const hiddenCounts = ELEMENT_LABELS.reduce((acc, key) => ({ ...acc, [key]: 0 }), {});
      tokens.forEach(item => {
        if (item.source === "hidden") {
          hiddenCounts[item.element] += item.weight;
        } else {
          mainCounts[item.element] += item.weight;
        }
      });
      const counts = ELEMENT_LABELS.reduce((acc, key) => ({ ...acc, [key]: Number((mainCounts[key] + hiddenCounts[key]).toFixed(1)) }), {});
      return { tokens, counts, mainCounts, hiddenCounts };
    }

    function getPartnerReading(calc, usefulGods, tenGodCounts, branches) {
      const isMale = calc.gender === "male";
      const focusGods = isMale ? ["正财", "偏财"] : ["正官", "七杀"];
      const total = focusGods.reduce((sum, key) => sum + (tenGodCounts[key] || 0), 0);
      const focusText = isMale ? (lang === "zh" ? "财星" : "Wealth stars") : (lang === "zh" ? "官杀" : "Officer/Killing stars");
      const good = focusGods.some(g => usefulGods.favorable.includes(STEM_ELEMENT[inferRepresentativeStemByTenGod(calc.dayPillar.stem, g)]));
      const peach = branches.filter(branch => ["子", "午", "卯", "酉"].includes(branch));
      let summary = `${isMale ? t("relation_male_prefix") : t("relation_female_prefix")} ${t("wealth_prefix", { n: total }).replace(lang === "zh" ? "原局财星合计" : "Wealth stars total", focusText)}`;

      if (total >= 3) {
        summary += good ? ` ${t("relation_high", { focusStar: focusText, n: total })}` : ` ${t("relation_high_bad", { focusStar: focusText, n: total })}`;
      } else if (total >= 1) {
        summary += ` ${t("relation_mid")}`;
      } else {
        summary += ` ${t("relation_low")}`;
      }

      if (peach.length) {
        summary += ` ${t("relation_peach", { branches: [...new Set(peach)].join(lang === "zh" ? "、" : ", ") })}`;
      }

      return summary;
    }

    function inferRepresentativeStemByTenGod(dayStem, tenGod) {
      const stem = STEMS.find(target => getTenGod(dayStem, target) === tenGod);
      return stem || dayStem;
    }

    function detectConflicts(pillars) {
      const branches = pillars.map(p => p.branch);
      const clashes = [];
      for (let i = 0; i < branches.length; i += 1) {
        for (let j = i + 1; j < branches.length; j += 1) {
          if (CLASH_BRANCH[branches[i]] === branches[j]) {
            clashes.push(`${pillars[i].label}支${branches[i]}冲${pillars[j].label}支${branches[j]}`);
          }
        }
      }
      const stems = pillars.map(p => ({ label: p.label, stem: p.stem }));
      const stemClashes = [];
      for (let i = 0; i < stems.length; i += 1) {
        for (let j = i + 1; j < stems.length; j += 1) {
          if (getOfficerElement(STEM_ELEMENT[stems[i].stem]) === STEM_ELEMENT[stems[j].stem] || getOfficerElement(STEM_ELEMENT[stems[j].stem]) === STEM_ELEMENT[stems[i].stem]) {
            stemClashes.push(`${stems[i].label}干${stems[i].stem}与${stems[j].label}干${stems[j].stem}相克`);
          }
        }
      }
      return { clashes, stemClashes };
    }

    function getPersonalityText(dayStem, strengthLabel, dominantTenGod) {
      const element = STEM_ELEMENT[dayStem];
      const elementDesc = t(`personality_element.${element}`);
      const strengthDesc = t(`personality_strength.${strengthLabel}`);
      return lang === "zh"
        ? `日主${dayStem}${element}${elementDesc}${strengthDesc} 命盘里${dominantTenGod}较多，说明${TEN_GOD_DESC[dominantTenGod].replace("主", "更容易表现为")}。`
        : `Day Stem ${dayStem} is ${labelForElement(element)}: ${elementDesc}, ${strengthDesc} ${t("personality_dominant", { tenGod: labelForTenGod(dominantTenGod), desc: I18N[lang].tenGodDesc[dominantTenGod] })}`;
    }

    function buildLifeDomains(calc, usefulGods, tenGodCounts, patternInfo, strength, elementStats) {
      const pillars = calc.pillars;
      const branches = pillars.map(p => p.branch);
      const dominantTenGod = getDominantTenGod(tenGodCounts);
      const favorableIndustries = usefulGods.favorable.flatMap(el => INDUSTRY_BY_ELEMENT[el] || []).slice(0, 6);
      const wealthPower = (tenGodCounts["正财"] || 0) + (tenGodCounts["偏财"] || 0);
      const officialPower = (tenGodCounts["正官"] || 0) + (tenGodCounts["七杀"] || 0);
      const outputPower = (tenGodCounts["食神"] || 0) + (tenGodCounts["伤官"] || 0);
      const mostLacking = Object.entries(elementStats.counts).sort((a, b) => a[1] - b[1])[0][0];
      const mostExcess = Object.entries(elementStats.counts).sort((a, b) => b[1] - a[1])[0][0];
      const conflicts = detectConflicts(pillars);

      let career = t("career_prefix", {
        favorable: usefulGods.favorable.map(labelForElement).join(lang === "zh" ? "、" : ", "),
        industries: favorableIndustries.slice(0, 4).join(lang === "zh" ? "、" : ", ")
      });
      if (officialPower >= outputPower && officialPower >= wealthPower) {
        career += ` ${t("career_official")}`;
      } else if (outputPower > officialPower && outputPower >= wealthPower) {
        career += ` ${t("career_output")}`;
      } else {
        career += ` ${t("career_wealth")}`;
      }

      let wealth = t("wealth_prefix", { n: wealthPower });
      if ((tenGodCounts["正财"] || 0) > (tenGodCounts["偏财"] || 0)) {
        wealth += ` ${t("wealth_zhengCai")}`;
      } else if ((tenGodCounts["偏财"] || 0) > (tenGodCounts["正财"] || 0)) {
        wealth += ` ${t("wealth_pianCai")}`;
      } else {
        wealth += ` ${t("wealth_equal")}`;
      }
      wealth += strength.isWeak ? ` ${t("wealth_weak")}` : ` ${t("wealth_strong")}`;

      const relation = getPartnerReading(calc, usefulGods, tenGodCounts, branches);
      const health = t("health_main", {
        lacking: labelForElement(mostLacking),
        excess: labelForElement(mostExcess),
        lackingOrgan: ORGAN_BY_ELEMENT[mostLacking],
        excessOrgan: ORGAN_BY_ELEMENT[mostExcess]
      }) + (conflicts.clashes.length || conflicts.stemClashes.length
        ? ` ${t("health_clash", { clashes: [...conflicts.clashes, ...conflicts.stemClashes].slice(0, 2).join(lang === "zh" ? "、" : ", ") })}`
        : ` ${t("health_noclash")}`);

      const personality = getPersonalityText(calc.dayPillar.stem, strength.label, dominantTenGod);

      return {
        career,
        wealth,
        relation,
        health,
        personality,
        dominantTenGod,
        conflicts
      };
    }

    function buildOverallSummary(calc, strength, usefulGods, patternInfo, luckAssessments, domains) {
      const pivotal = [...luckAssessments].sort((a, b) => Math.abs(b.score) - Math.abs(a.score))[0];
      const adviceElement = usefulGods.favorable[0];
      const directionMap = lang === "zh"
        ? { 木: "东方", 火: "南方", 土: "中部与本地资源", 金: "西方", 水: "北方" }
        : { 木: "East", 火: "South", 土: "Central region", 金: "West", 水: "North" };
      let text = t("overall_template", {
        pattern: labelForPattern(patternInfo.pattern),
        strength: t(`strengthLabels.${strength.label}`),
        dominantTenGod: labelForTenGod(domains.dominantTenGod),
        unfav: usefulGods.unfavorable.map(labelForElement).join(lang === "zh" ? "、" : ", "),
        ageRange: pivotal.ageRange,
        ganZhi: pivotal.ganZhi,
        favorable: usefulGods.favorable.map(labelForElement).join(lang === "zh" ? "、" : ", "),
        direction: directionMap[adviceElement]
      });
      if (text.length < 150) {
        text += lang === "zh" ? " 这样既能守住命局平衡，也更容易把好运真正转成成果。" : " This improves the odds that favorable cycles become concrete results.";
      }
      if (text.length > 200) {
        text = text.slice(0, 198) + "。";
      }
      return text;
    }

    function formatCount(value) {
      return Number.isInteger(value) ? String(value) : value.toFixed(1);
    }

    function analyzeChart(calc) {
      const pillars = [
        { label: "年", ...calc.yearPillar },
        { label: "月", ...calc.monthPillar },
        { label: "日", ...calc.dayPillar },
        { label: "时", ...calc.hourPillar }
      ];
      calc.pillars = pillars;
      const elementStats = getElementStats(pillars);
      const strength = analyzeStrength(pillars, calc.dayPillar.stem, calc.monthPillar.branch);
      const baseUsefulGods = analyzeUsefulGods(strength);
      const tenGodEntries = buildTenGodEntries(calc);
      const tenGodCounts = countTenGods(calc);
      const patternInfo = detectPattern(calc, strength);
      const usefulGods = patternInfo.overrideUsefulGods
        ? { ...patternInfo.overrideUsefulGods, baseFavorable: baseUsefulGods.favorable, baseUnfavorable: baseUsefulGods.unfavorable }
        : baseUsefulGods;
      const relations = detectGanZhiRelations(calc);
      const specialStars = detectSpecialStars(calc);
      const luckAssessments = assessLuckCycles(calc, usefulGods);
      const domains = buildLifeDomains(calc, usefulGods, tenGodCounts, patternInfo, strength, elementStats);
      const overall = buildOverallSummary(calc, strength, usefulGods, patternInfo, luckAssessments, domains);
      return {
        pillars,
        elementStats,
        strength,
        usefulGods,
        tenGodEntries,
        tenGodCounts,
        patternInfo,
        relations,
        specialStars,
        luckAssessments,
        domains,
        overall
      };
    }

              <strong>${t("favorableLabel")}</strong>
              ${analysis.usefulGods.favorable.map(el => highlightTag(el, el)).join("")}
            </div>
            <div class="unfavorable-row">
              <strong>${t("unfavorableLabel")}</strong>
              ${analysis.usefulGods.unfavorable.map(el => highlightTag(el, el, true)).join("")}
            </div>
            <div class="reason">${t("analysisChain")} ${analysis.usefulGods.explanation}</div>
          </div>
        </details>

        <details class="reading-card">
          <summary><span>${t("sectionTitles.3")}</span><span>›</span></summary>
          <div class="reading-content">
            <table class="tg-table">
              <thead>

                  <th>${t("thPosition")}</th>
                  <th>${t("thSymbol")}</th>
                  <th>${t("thTenGod")}</th>
                  <th>${t("thDescription")}</th>
                </tr>
              </thead>
              <tbody>
                ${analysis.tenGodEntries.map(item => `
                  <tr>
                    <td>${item.key}</td>
                    <td>${item.type === "地支主气" ? `${item.raw}支主气 ${item.char}` : item.char}</td>
                    <td title="${t(`tenGodDesc.${item.tenGod}`)}">${labelForTenGod(item.tenGod)}</td>
                    <td>${t(`tenGodDesc.${item.tenGod}`)}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
            <div class="reason">${t("analysisChain")} ${t("tenGodChainNote", { stem: calc.dayPillar.stem })}</div>
          </div>
        </details>

        <details class="reading-card">
          <summary><span>${t("sectionTitles.4")}</span><span>›</span></summary>
          <div class="reading-content">
            <div class="section-title">
              <span class="level">${t("patternLabel")} ${labelForPattern(analysis.patternInfo.pattern)}</span>
            </div>
            <div class="reason">${t("analysisChain")} ${analysis.patternInfo.chain}</div>
            <div class="sub-card">
              <p>${analysis.patternInfo.detail}</p>
              ${analysis.patternInfo.special ? `<p>${analysis.patternInfo.special}</p>` : ""}
            </div>
          </div>
        </details>

        <details class="reading-card">
          <summary><span>${t("sectionTitles.5")}</span><span>›</span></summary>
          <div class="reading-content">
            <table class="luck-table">
              <thead>
                <tr>
                  <th>${t("thAgeRange")}</th>
                  <th>${t("luckCyclesTitle")}</th>
                  <th>${t("thRating")}</th>
                  <th>${t("thNote")}</th>
                </tr>
              </thead>
              <tbody>
                ${analysis.luckAssessments.map(item => `
                  <tr class="${item.isCurrent ? "luck-active" : ""}">
                    <td>${item.ageRange}${item.isCurrent ? ` ${t("currentLuckLabel")}` : ""}</td>
                    <td>${item.ganZhi}</td>
                    <td>${t(`luckRatings.${item.rating}`)}</td>
                    <td>${item.note}</td>

        <details class="reading-card">
          <summary><span>${t("sectionTitles.6")}</span><span>›</span></summary>
          <div class="reading-content">
            <div class="domain-grid">
              <div class="sub-card">
                <h4>${t("domainTitles.career")}</h4>
                <p>${analysis.domains.career}</p>
              </div>
              <div class="sub-card">
                <h4>${t("domainTitles.wealth")}</h4>
                <p>${analysis.domains.wealth}</p>
              </div>
              <div class="sub-card">
                <h4>${t("domainTitles.relation")}</h4>
                <p>${analysis.domains.relation}</p>
              </div>
              <div class="sub-card">
                <h4>${t("domainTitles.health")}</h4>
                <p>${analysis.domains.health}</p>
              </div>
              <div class="sub-card">
                <h4>${t("domainTitles.personality")}</h4>
                <p>${analysis.domains.personality}</p>
              </div>
              <div class="sub-card">
                <h4>${t("domainTitles.basis")}</h4>
                <p>${t("domainBasisNote", { tenGod: labelForTenGod(analysis.domains.dominantTenGod) })}</p>
              </div>
            </div>
          </div>
        </details>

        <details class="reading-card">
          <summary><span>${t("sectionTitles.7")}</span><span>›</span></summary>
          <div class="reading-content">
            <div class="overall">${analysis.overall}</div>
          </div>
        </details>
      `;
    }

    function calculateBaZi({ birthDateISO, shichen, ziSplit, gender }) {
      const birthDate = parseISODate(birthDateISO);
      const yearPillar = getYearPillar(birthDate);
      const monthPillar = getMonthInfo(birthDate, yearPillar.stem);
      const dayPillar = getDayPillar(birthDate, shichen, ziSplit);
      const hourPillar = getHourPillar(dayPillar.stem, shichen);
      const luckDirection = getLuckDirection(yearPillar.stem, gender);
      const luckStart = getLuckStartInfo(birthDate, luckDirection.forward);
      const majorLuck = getMajorLuck(monthPillarToIndex(monthPillar), luckDirection.forward, luckStart.startAge);
      return {
        birthDate,
        gender,
        yearPillar,
        monthPillar,
        dayPillar,
        hourPillar,
        luckDirection,
        luckStart,
        majorLuck
      };
    }

    function updateZiSplitVisibility() {
      ziSplitFieldEl.style.display = shichenEl.value === "子" ? "grid" : "none";
    }

    function runValidationCases() {
      const cases = [
        { id: "check-1984", input: { birthDateISO: "1984-02-04", shichen: "午", ziSplit: "early", gender: "male" }, expected: "甲子" },
        { id: "check-1990", input: { birthDateISO: "1990-01-27", shichen: "午", ziSplit: "early", gender: "male" }, expected: "己巳" },
        { id: "check-2000", input: { birthDateISO: "2000-02-04", shichen: "午", ziSplit: "early", gender: "male" }, expected: "庚辰" }
      ];

      cases.forEach(testCase => {
        const result = calculateBaZi(testCase.input);
        const el = document.getElementById(testCase.id);
        if (result.yearPillar.text === testCase.expected) {
          el.textContent = t("validationPass", { result: result.yearPillar.text });
          el.className = "status-ok";
        } else {
          el.textContent = t("validationFail", { result: result.yearPillar.text, expected: testCase.expected });
          el.className = "status-warn";
        }
      });

      const seasonCase = calculateBaZi({
        birthDateISO: "1990-10-15",
        shichen: "午",
        ziSplit: "early",
        gender: "female"
      });
      const seasonEl = document.getElementById("check-1990-season");
      if (seasonCase.monthPillar.branch === "戌" && SEASON_BRANCH_ELEMENT[seasonCase.monthPillar.branch] === "土") {
        seasonEl.textContent = t("validationPass", { result: lang === "zh" ? `月支${seasonCase.monthPillar.branch}按土论月令` : `month branch ${seasonCase.monthPillar.branch} maps to Earth` });
        seasonEl.className = "status-ok";
      } else {
        seasonEl.textContent = t("validationFail", {
          result: `month branch ${seasonCase.monthPillar.branch} -> ${SEASON_BRANCH_ELEMENT[seasonCase.monthPillar.branch]}`,
          expected: "戌 -> 土"
        });
        seasonEl.className = "status-warn";
      }

      const today = new Date();
      const oneDayMs = 86400000;
      const testDate = new Date(today.getTime() - oneDayMs);
      const validationBirth = {
        birthDateISO: formatISODate({
          year: testDate.getFullYear() - 30,
          month: testDate.getMonth() + 1,
          day: testDate.getDate()
        }),
        shichen: "午",
        ziSplit: "early",
        gender: "male"
      };
      const currentLuckCalc = calculateBaZi(validationBirth);
      const exactAge = getCurrentAge(currentLuckCalc.birthDate, today);
      const expectedIndex = currentLuckCalc.majorLuck.findIndex(item => exactAge >= item.ageStart && exactAge < item.ageEnd);
      const actualIndex = getCurrentLuckIndex(currentLuckCalc, today);
      const currentLuckEl = document.getElementById("check-current-luck");
      if (expectedIndex === actualIndex) {
        currentLuckEl.textContent = actualIndex >= 0
          ? t("validationPass", { result: lang === "zh" ? `周岁 ${exactAge}，当前高亮第 ${actualIndex + 1} 运` : `age ${exactAge}, cycle ${actualIndex + 1} highlighted` })
          : t("validationPass", { result: lang === "zh" ? `周岁 ${exactAge}，当前尚未入运` : `age ${exactAge}, no active cycle yet` });
        currentLuckEl.className = "status-ok";
      } else {
        currentLuckEl.textContent = t("validationFail", { result: `age ${exactAge}, got ${actualIndex + 1}`, expected: `${expectedIndex + 1}` });
        currentLuckEl.className = "status-warn";
      }
    }

    function getFormValue(formData, key, fallback = "") {
      const value = formData.get(key);
      return value == null ? fallback : value;
    }

    formEl.addEventListener("submit", event => {
      event.preventDefault();
      const formData = new FormData(formEl);
      const birthDateISO = getFormValue(formData, "birthDate");
      if (!birthDateISO) return;
      const calc = calculateBaZi({
        birthDateISO,
        shichen: getFormValue(formData, "shichen", "子"),
        ziSplit: getFormValue(formData, "ziSplit", "early"),
        gender: getFormValue(formData, "gender", "male")
      });
      lastCalc = calc;
      renderResults(calc);
    });

    shichenEl.addEventListener("change", updateZiSplitVisibility);
    printBtnEl.addEventListener("click", () => window.print());
    langBtnEl.addEventListener("click", () => {
      lang = lang === "zh" ? "en" : "zh";
      applyStaticLabels();
      runValidationCases();
      if (lastCalc) {
        renderResults(lastCalc);
      }
    });

    let printState = [];
    window.addEventListener("beforeprint", () => {
      printState = Array.from(document.querySelectorAll("details.reading-card")).map(el => el.open);
      document.querySelectorAll("details.reading-card").forEach(el => { el.open = true; });
    });
    window.addEventListener("afterprint", () => {
      document.querySelectorAll("details.reading-card").forEach((el, index) => { el.open = Boolean(printState[index]); });
    });

    applyStaticLabels();
    updateZiSplitVisibility();
    birthDateEl.value = formatISODate({ year: 1990, month: 1, day: 27 });
    runValidationCases();
    lastCalc = calculateBaZi({
      birthDateISO: birthDateEl.value,
      shichen: "子",
      ziSplit: "early",
      gender: "male"
    });
    renderResults(lastCalc);
  </script>
</body>
